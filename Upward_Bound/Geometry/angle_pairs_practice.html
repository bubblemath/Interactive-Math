
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angle Pairs Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f5f4f0;
    --surface:  #ffffff;
    --border:   #d4d0c8;
    --border2:  #b0aaa0;
    --text:     #1a1a1a;
    --muted:    #6b6560;
    --purple:   #534AB7;
    --purple-l: #EEEDFE;
    --purple-d: #3C3489;
    --green:    #1D9E75;
    --green-l:  #E1F5EE;
    --green-d:  #085041;
    --red:      #E24B4A;
    --red-l:    #FCEBEB;
    --red-d:    #501313;
    --c1:       #4B8EF5;
    --c2:       #2DB87C;
    --ray:      #374151;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 20px 40px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 20px;
    color: var(--text);
  }
  .mode-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }
  .mode-btn {
    padding: 10px 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    text-align: center;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
    transition: border-color 0.15s, background 0.15s;
  }
  .mode-btn:hover {
    border-color: var(--border2);
    background: #f0eff8;
  }
  .mode-btn.active {
    border: 2px solid var(--purple);
    background: var(--purple-l);
    color: var(--purple-d);
    font-weight: 600;
  }
  .mode-num {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .mode-btn.active .mode-num { color: var(--purple); }

  .progress-bar {
    max-width: 700px;
    margin: 0 auto 16px;
    height: 6px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--purple);
    border-radius: 4px;
    transition: width 0.4s;
    width: 0%;
  }

  .qcard {
    max-width: 700px;
    margin: 0 auto;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
  }
  .q-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .q-badge {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--purple-l);
    color: var(--purple-d);
    font-weight: 500;
    border: 1px solid #AFA9EC;
  }
  .stats {
    display: flex;
    gap: 14px;
  }
  .stat {
    font-size: 13px;
    color: var(--muted);
  }
  .stat strong { color: var(--text); }

  canvas {
    display: block;
    margin: 0 auto 16px;
    border-radius: 8px;
    background: #f8f9ff;
    border: 1px solid var(--border);
  }

  .q-text {
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 16px;
    color: var(--text);
  }

  .mc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .mc-btn {
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .mc-btn:hover { border-color: var(--border2); background: #fafafa; }
  .mc-btn.correct  { border-color: var(--green); background: var(--green-l); color: var(--green-d); }
  .mc-btn.wrong    { border-color: var(--red);   background: var(--red-l);   color: var(--red-d); }
  .mc-btn.reveal   { border-color: var(--green); background: var(--green-l); color: var(--green-d); }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
  }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-row input:focus { border-color: var(--purple); }
  .input-row input.correct { border-color: var(--green); background: var(--green-l); color: var(--green-d); }
  .input-row input.wrong   { border-color: var(--red);   background: var(--red-l);   color: var(--red-d); }

  .check-btn {
    padding: 10px 22px;
    border: 1.5px solid var(--purple);
    border-radius: 8px;
    background: var(--purple-l);
    color: var(--purple-d);
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .check-btn:hover { background: #CECBF6; }

  .feedback {
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 14px;
    display: none;
    line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: var(--green-l); color: var(--green-d); border: 1px solid var(--green); }
  .feedback.no { background: var(--red-l);   color: var(--red-d);   border: 1px solid var(--red); }

  .next-btn {
    padding: 10px 22px;
    border: 1.5px solid var(--border2);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    display: none;
  }
  .next-btn:hover { background: var(--bg); }

  .done-area {
    text-align: center;
    padding: 16px 0;
  }
  .done-score {
    font-size: 36px;
    font-weight: 600;
    color: var(--purple);
    margin-bottom: 6px;
  }
  .done-msg {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .replay-btn {
    padding: 11px 28px;
    border: 2px solid var(--purple);
    border-radius: 8px;
    background: var(--purple);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .replay-btn:hover { background: var(--purple-d); border-color: var(--purple-d); }
</style>
</head>
<body>

<h1>Angle Pairs Practice</h1>

<div class="mode-row">
  <button class="mode-btn active" id="mb0" onclick="setMode(0)">
    <span class="mode-num">Set 1</span>Identify the pair
  </button>
  <button class="mode-btn" id="mb1" onclick="setMode(1)">
    <span class="mode-num">Set 2</span>Congruent or sum?
  </button>
  <button class="mode-btn" id="mb2" onclick="setMode(2)">
    <span class="mode-num">Set 3</span>Solve for x
  </button>
  <button class="mode-btn" id="mb3" onclick="setMode(3)">
    <span class="mode-num">Set 4</span>Find the angle
  </button>
</div>

<div class="progress-bar"><div class="progress-fill" id="prog"></div></div>

<div class="qcard" id="qcard">
  <div class="q-top">
    <span class="q-badge" id="qbadge">Set 1 — Identify the pair</span>
    <div class="stats">
      <div class="stat">Correct: <strong id="scoreC">0</strong></div>
      <div class="stat">Total: <strong id="scoreT">0</strong></div>
    </div>
  </div>

  <canvas id="qc" width="500" height="220"></canvas>

  <div class="q-text" id="qtext"></div>
  <div class="mc-grid" id="mcgrid"></div>

  <div class="input-row" id="inputrow" style="display:none;">
    <input type="number" id="ans" placeholder="Enter your answer"
           onkeydown="if(event.key==='Enter')checkFree()">
    <button class="check-btn" onclick="checkFree()">Check</button>
  </div>

  <div class="feedback" id="fb"></div>
  <button class="next-btn" id="nextbtn" onclick="nextQ()">Next question →</button>

  <div class="done-area" id="donearea" style="display:none;"></div>
</div>

<script>
const C1='#4B8EF5', C2='#2DB87C', RC='#374151';
const D=Math.PI/180;
let mode=0, score=0, total=0, answered=false, qCount=0;
const TOTAL=10;

const TYPES=['complementary','supplementary','vertical','linear pair'];
const PROPS={
  'complementary':{sum:90, congruent:false},
  'supplementary':{sum:180,congruent:false},
  'vertical':     {sum:null,congruent:true},
  'linear pair':  {sum:180,congruent:false}
};

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rand(0,arr.length-1)];}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=rand(0,i);[b[i],b[j]]=[b[j],b[i]];}return b;}

function genProblem(m){
  const type=pick(TYPES), prop=PROPS[type];
  if(m===0||m===1){
    const a=rand(15,75);
    const b=prop.congruent?a:(prop.sum-a);
    return{type,a,b,mode:m};
  }
  if(m===2){
    const x=rand(5,20);
    const c1=rand(1,5), o1=rand(-5,20);
    let c2,o2;
    if(prop.congruent){
      c2=rand(1,4); o2=c1*x+o1-c2*x;
      if(Math.abs(o2)>40){c2=c1+1;o2=c1*x+o1-c2*x;}
    } else {
      const s=prop.sum; c2=rand(1,4);
      o2=s-(c1+c2)*x-o1;
      if(o2<1||o2>60){c2=2;o2=s-(c1+c2)*x-o1;}
      if(o2<1)o2=5;
    }
    const e1=`${c1}x${o1>=0?'+':''}${o1}`, e2=`${c2}x${o2>=0?'+':''}${o2}`;
    return{type,x,c1,o1,c2,o2,e1,e2,mode:2};
  }
  if(m===3){
    const x=rand(5,20);
    const c1=rand(1,4),o1=rand(5,25);
    let c2,o2;
    if(prop.congruent){
      c2=c1+rand(1,2); o2=c1*x+o1-c2*x;
      if(o2<1){o2=3;}
    } else {
      c2=rand(1,4);
      o2=prop.sum-(c1+c2)*x-o1;
      if(o2<1){c2=1;o2=prop.sum-(c1+c2)*x-o1;}
      if(o2<1)o2=4;
    }
    const e1=`${c1}x+${o1}`, e2=`${c2}x+${Math.max(1,o2)}`;
    const a1=c1*x+o1, a2=c2*x+Math.max(1,o2);
    const askFirst=Math.random()<0.5;
    return{type,x,c1,o1,c2,o2:Math.max(1,o2),e1,e2,a1,a2,askFirst,mode:3};
  }
}

let current=null;

function setMode(m){
  mode=m; score=0; total=0; qCount=0; answered=false;
  ['mb0','mb1','mb2','mb3'].forEach((id,i)=>document.getElementById(id).classList.toggle('active',i===m));
  const labs=['Set 1 — Identify the pair','Set 2 — Congruent or sum?','Set 3 — Solve for x','Set 4 — Find the angle'];
  document.getElementById('qbadge').textContent=labs[m];
  document.getElementById('donearea').style.display='none';
  document.getElementById('qtext').style.display='';
  document.getElementById('mcgrid').style.display='grid';
  updateStats(); nextQ();
}

function nextQ(){
  if(qCount>=TOTAL){showDone();return;}
  answered=false;
  current=genProblem(mode); qCount++;
  document.getElementById('prog').style.width=(qCount/TOTAL*100)+'%';
  document.getElementById('fb').className='feedback';
  document.getElementById('nextbtn').style.display='none';
  document.getElementById('donearea').style.display='none';
  document.getElementById('qtext').style.display='';
  render(current);
}

function render(p){
  drawDiagram(p);
  const showMC=(p.mode===0||p.mode===1);
  document.getElementById('mcgrid').style.display=showMC?'grid':'none';
  document.getElementById('inputrow').style.display=showMC?'none':'flex';

  if(p.mode===0){
    document.getElementById('qtext').textContent='What type of angle pair is shown?';
    const opts=shuffle([...TYPES]);
    document.getElementById('mcgrid').innerHTML=
      opts.map(o=>`<button class="mc-btn" data-val="${o}" onclick="checkMC(this,'${o}','${p.type}')">${cap(o)}</button>`).join('');
  }
  else if(p.mode===1){
    document.getElementById('qtext').textContent=`These are ${cap(p.type)} angles. Which statement is true?`;
    const cor=p.type==='vertical'?'They are congruent (equal)':(PROPS[p.type].sum===90?'They add up to 90°':'They add up to 180°');
    const distractors=['They add up to 90°','They add up to 180°','They are congruent (equal)','They add up to 360°'].filter(x=>x!==cor);
    const opts=shuffle([cor,...distractors.slice(0,3)]);
    document.getElementById('mcgrid').innerHTML=
      opts.map(o=>`<button class="mc-btn" data-val="${o}" onclick="checkMC(this,this.dataset.val,'${cor.replace(/'/g,"\\'")}')">${o}</button>`).join('');
  }
  else if(p.mode===2){
    const rel=PROPS[p.type].congruent?'equal (congruent)':`add up to ${PROPS[p.type].sum}°`;
    document.getElementById('qtext').innerHTML=
      `These are <strong>${cap(p.type)}</strong> angles — they ${rel}.<br>
       <span style="color:${C1}">Angle 1 = <strong>${p.e1}</strong></span> &nbsp;
       <span style="color:${C2}">Angle 2 = <strong>${p.e2}</strong></span><br>
       Solve for <em>x</em>.`;
    const inp=document.getElementById('ans');
    inp.value=''; inp.className=''; inp.placeholder='x = ?';
  }
  else if(p.mode===3){
    const rel=PROPS[p.type].congruent?'equal (congruent)':`add up to ${PROPS[p.type].sum}°`;
    const askExpr=p.askFirst?`<span style="color:${C1}"><strong>${p.e1}</strong></span>`:`<span style="color:${C2}"><strong>${p.e2}</strong></span>`;
    const givenExpr=p.askFirst?`<span style="color:${C2}"><strong>${p.e2}</strong></span>`:`<span style="color:${C1}"><strong>${p.e1}</strong></span>`;
    document.getElementById('qtext').innerHTML=
      `These are <strong>${cap(p.type)}</strong> angles — they ${rel}.<br>
       One angle = ${givenExpr}<br>
       Find the degree measure of the other angle (${askExpr}).`;
    const inp=document.getElementById('ans');
    inp.value=''; inp.className=''; inp.placeholder='angle = ?°';
  }
}

function checkMC(btn,chosen,correct){
  if(answered)return;
  answered=true; total++;
  document.querySelectorAll('.mc-btn').forEach(b=>{
    if(b.dataset.val===correct) b.classList.add('reveal');
  });
  if(chosen===correct){score++;btn.classList.add('correct');showFb(true,'Correct!');}
  else{btn.classList.add('wrong');showFb(false,`Not quite — the correct answer is: ${correct}`);}
  updateStats();
  document.getElementById('nextbtn').style.display='inline-block';
}

function checkFree(){
  if(answered)return;
  const inp=document.getElementById('ans');
  const val=parseFloat(inp.value);
  if(isNaN(val)){inp.placeholder='Enter a number';return;}
  answered=true; total++;
  const p=current;
  let correct= p.mode===2 ? p.x : (p.askFirst?p.a1:p.a2);
  const ok=Math.abs(val-correct)<0.5;
  inp.className=ok?'correct':'wrong';
  if(ok){score++;showFb(true,'Correct! Great work.');}
  else{
    if(p.mode===2){
      const eqStr=PROPS[p.type].congruent?`${p.e1} = ${p.e2}`:`(${p.e1}) + (${p.e2}) = ${PROPS[p.type].sum}`;
      showFb(false,`Not quite. The answer is x = ${correct}. Set up: ${eqStr}`);
    } else {
      showFb(false,`Not quite. The angle measures ${correct}°. First find x = ${p.x}, then substitute.`);
    }
  }
  updateStats();
  document.getElementById('nextbtn').style.display='inline-block';
}

function showFb(ok,msg){
  const fb=document.getElementById('fb');
  fb.textContent=msg; fb.className=`feedback show ${ok?'ok':'no'}`;
}

function showDone(){
  document.getElementById('qtext').style.display='none';
  document.getElementById('mcgrid').style.display='none';
  document.getElementById('inputrow').style.display='none';
  document.getElementById('fb').className='feedback';
  document.getElementById('nextbtn').style.display='none';
  const pct=Math.round(score/TOTAL*100);
  const msg=pct>=80?'Excellent work!':pct>=60?'Good effort — keep practicing!':'Keep going — you\'ve got this!';
  const emoji=pct>=80?'🌟':pct>=60?'👍':'💪';
  const da=document.getElementById('donearea');
  da.style.display='block';
  da.innerHTML=`
    <div style="font-size:48px;margin-bottom:8px;">${emoji}</div>
    <div class="done-score">${score} / ${TOTAL}</div>
    <div class="done-msg">${msg} (${pct}%)</div>
    <button class="replay-btn" onclick="restartMode()">Try again</button>`;
  const canvas=document.getElementById('qc');
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#f8f9ff'; ctx.fillRect(0,0,500,220);
}

function restartMode(){
  score=0;total=0;qCount=0;answered=false;
  document.getElementById('donearea').style.display='none';
  updateStats(); nextQ();
}

function updateStats(){
  document.getElementById('scoreC').textContent=score;
  document.getElementById('scoreT').textContent=total;
}

/* ── CANVAS DRAWING ───────────────────────────────────── */
function drawDiagram(p){
  const canvas=document.getElementById('qc');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,500,220);
  ctx.fillStyle='#f8f9ff'; ctx.fillRect(0,0,500,220);

  const showVals=(p.mode===2||p.mode===3);

  const arrow=(x1,y1,x2,y2,col)=>{
    col=col||RC;
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    const a=Math.atan2(y2-y1,x2-x1);
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-10*Math.cos(a-.28),y2-10*Math.sin(a-.28));
    ctx.lineTo(x2-10*Math.cos(a+.28),y2-10*Math.sin(a+.28));
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=RC; ctx.lineWidth=2.5;
  };
  const ln=(x1,y1,x2,y2)=>{ctx.strokeStyle=RC;ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();};
  const sector=(cx,cy,r,sd,ed,col,ccw)=>{
    const s=sd*D,e=ed*D;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,s,e,!!ccw); ctx.closePath();
    ctx.fillStyle=col; ctx.globalAlpha=0.28; ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle=col; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.arc(cx,cy,r,s,e,!!ccw); ctx.stroke();
    ctx.strokeStyle=RC; ctx.lineWidth=2.5;
  };
  const lbl=(x,y,t,col,sz,w)=>{
    ctx.font=`${w||'normal'} ${sz||13}px 'Poppins',sans-serif`;
    ctx.fillStyle=col||RC;
    ctx.textAlign='left';
    ctx.fillText(t,x,y);
  };
  const clbl=(x,y,t,col,sz)=>{
    ctx.font=`600 ${sz||13}px 'Poppins',sans-serif`;
    ctx.fillStyle=col||RC; ctx.textAlign='center';
    ctx.fillText(t,x,y); ctx.textAlign='left';
  };

  const l1 = showVals ? p.e1 : `${p.a}°`;
  const l2 = showVals ? p.e2 : `${p.b}°`;

  switch(p.type){

    case 'complementary':{
      const vx=80, vy=175;
      sector(vx,vy,68,-38,0,C1);
      sector(vx,vy,68,-90,-38,C2);
      arrow(vx,vy,380,vy,RC);
      arrow(vx,vy,vx,25,RC);
      arrow(vx,vy,330,65,RC);
      ctx.strokeStyle=RC; ctx.lineWidth=1.8; ctx.strokeRect(vx,vy-15,15,15);
      lbl(vx-16,vy+16,'R',RC,12);
      lbl(383,vy+5,'U',RC,12);
      lbl(vx-4,18,'D',RC,12);
      lbl(334,61,'M',RC,12);
      clbl(vx+90,vy-10,l1,C1,14);
      clbl(vx+22,vy-72,l2,C2,14);
      break;
    }

    case 'supplementary':{
      /* Two separate non-touching angles */
      const lx=100, ly=160, rx=360, ry=160;
      /* Left angle (blue) opening ~120° upward-left */
      sector(lx,ly,65,-120,0,C1);
      arrow(lx,ly,lx+80,ly,RC);
      arrow(lx,ly,lx-40,ly-70,RC);
      lbl(lx-14,ly+15,'K',RC,12); lbl(lx+84,ly+5,'S',RC,12); lbl(lx-52,ly-72,'C',RC,12);
      clbl(lx+42,ly-26,l1,C1,14);
      /* Plus sign */
      ctx.font='bold 20px Poppins,sans-serif'; ctx.fillStyle=RC; ctx.textAlign='center';
      ctx.fillText('+',230,ly-10); ctx.textAlign='left';
      /* Right angle (green) opening ~60° upward-right */
      sector(rx,ry,65,-180,-60,C2,false);
      arrow(rx,ry,rx-80,ry,RC);
      arrow(rx,ry,rx+40,ry-70,RC);
      lbl(rx+5,ry+15,'P',RC,12); lbl(rx-94,ry+5,'T',RC,12); lbl(rx+42,ry-72,'J',RC,12);
      clbl(rx-42,ry-26,l2,C2,14);
      /* = 180° note */
      ctx.font='13px Poppins,sans-serif'; ctx.fillStyle=RC; ctx.textAlign='center';
      ctx.fillText('combined = 180°',250,210); ctx.textAlign='left';
      break;
    }

    case 'vertical':{
      const px=250, py=110;
      sector(px,py,68,50,130,C2,false);
      sector(px,py,68,230,310,C2,false);
      sector(px,py,68,130,230,C1,false);
      sector(px,py,68,-50,50,C1,false);
      const ex=(ang,d)=>px+d*Math.cos(ang*D);
      const ey=(ang,d)=>py+d*Math.sin(ang*D);
      ln(ex(130,95),ey(130,95),ex(-50,95),ey(-50,95));
      ln(ex(50,95), ey(50,95), ex(230,95),ey(230,95));
      ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fillStyle=RC; ctx.fill();
      lbl(ex(130,100)-8,ey(130,100)-2,'A',RC,12);
      lbl(ex(-50,100)+2,ey(-50,100)+3,'B',RC,12);
      lbl(ex(50,100)+2, ey(50,100)-2, 'C',RC,12);
      lbl(ex(230,100)-10,ey(230,100)+3,'D',RC,12);
      lbl(px+4,py-4,'P',RC,11);
      /* labels — ∠2 (green) top/bottom, ∠1 (blue) left/right */
      clbl(px,py-56,l2,C2,14);
      clbl(px,py+72,l2,C2,14);
      clbl(px-72,py+10,l1,C1,14);
      clbl(px+70,py+10,l1,C1,14);
      break;
    }

    case 'linear pair':{
      const ax=250, ay=165;
      sector(ax,ay,68,-90,0,C1);
      sector(ax,ay,68,-180,-90,C2);
      ln(20,ay,480,ay);
      arrow(ax,ay,ax,22,RC);
      lbl(14,ay+15,'B',RC,12); lbl(ax-5,ay+15,'A',RC,12);
      lbl(472,ay+15,'D',RC,12); lbl(ax+4,16,'C',RC,12);
      clbl(ax+36,ay-40,l1,C1,14);
      clbl(ax-80,ay-40,l2,C2,14);
      break;
    }
  }
}

/* boot */
setMode(0);
</script>
