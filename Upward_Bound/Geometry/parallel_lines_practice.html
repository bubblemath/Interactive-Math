
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Lines & Angle Pairs Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#d4d0c8;--border2:#a09890;
  --text:#1a1a1a;--muted:#6b6560;
  --pu:#534AB7;--pu-l:#EEEDFE;--pu-d:#3C3489;
  --gr:#1D9E75;--gr-l:#E1F5EE;--gr-d:#085041;
  --rd:#E24B4A;--rd-l:#FCEBEB;--rd-d:#501313;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 20px 48px;}
h1{font-size:20px;font-weight:600;text-align:center;margin-bottom:18px;}
.mode-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:720px;margin:0 auto 12px;}
.mode-btn{padding:10px 6px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;
  text-align:center;font-family:'Poppins',sans-serif;font-size:12px;color:var(--muted);line-height:1.4;transition:.15s;}
.mode-btn:hover{border-color:var(--border2);background:#f0eff8;}
.mode-btn.active{border:2px solid var(--pu);background:var(--pu-l);color:var(--pu-d);font-weight:600;}
.mode-num{display:block;font-size:10px;color:var(--muted);margin-bottom:2px;}
.mode-btn.active .mode-num{color:var(--pu);}
.pbar{max-width:720px;margin:0 auto 12px;height:6px;background:var(--border);border-radius:4px;overflow:hidden;}
.pfill{height:100%;background:var(--pu);border-radius:4px;transition:width .4s;width:0%;}
.qcard{max-width:720px;margin:0 auto;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:20px 24px;}
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.qbadge{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--pu-l);color:var(--pu-d);font-weight:500;border:1px solid #AFA9EC;}
.stats{display:flex;gap:14px;}
.stat{font-size:13px;color:var(--muted);}
.stat strong{color:var(--text);}
canvas{display:block;margin:0 auto 14px;border-radius:8px;background:#f8faff;border:1.5px solid var(--border);}
.qtext{font-size:15px;line-height:1.6;margin-bottom:14px;}
.mcgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mcbtn{padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:14px;color:var(--text);text-align:left;transition:.15s;}
.mcbtn:hover{border-color:var(--border2);background:#fafafa;}
.mcbtn.correct{border-color:var(--gr);background:var(--gr-l);color:var(--gr-d);}
.mcbtn.wrong{border-color:var(--rd);background:var(--rd-l);color:var(--rd-d);}
.mcbtn.reveal{border-color:var(--gr);background:var(--gr-l);color:var(--gr-d);}
.inrow{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.inrow input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--surface);color:var(--text);font-family:'Poppins',sans-serif;font-size:15px;outline:none;transition:.15s;}
.inrow input:focus{border-color:var(--pu);}
.inrow input.correct{border-color:var(--gr);background:var(--gr-l);color:var(--gr-d);}
.inrow input.wrong{border-color:var(--rd);background:var(--rd-l);color:var(--rd-d);}
.chkbtn{padding:10px 20px;border:1.5px solid var(--pu);border-radius:8px;background:var(--pu-l);
  color:var(--pu-d);font-family:'Poppins',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;}
.chkbtn:hover{background:#CECBF6;}
.fb{font-size:14px;padding:10px 14px;border-radius:8px;margin-bottom:12px;display:none;line-height:1.5;}
.fb.show{display:block;}
.fb.ok{background:var(--gr-l);color:var(--gr-d);border:1px solid var(--gr);}
.fb.no{background:var(--rd-l);color:var(--rd-d);border:1px solid var(--rd);}
.nxtbtn{padding:10px 22px;border:1.5px solid var(--border2);border-radius:8px;background:var(--surface);
  color:var(--text);font-family:'Poppins',sans-serif;font-size:14px;cursor:pointer;display:none;}
.nxtbtn:hover{background:var(--bg);}
.done{text-align:center;padding:16px 0;display:none;}
.done-score{font-size:40px;font-weight:600;color:var(--pu);margin-bottom:6px;}
.done-msg{font-size:15px;color:var(--muted);margin-bottom:16px;}
.rbtn{padding:11px 28px;border:2px solid var(--pu);border-radius:8px;background:var(--pu);
  color:#fff;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.rbtn:hover{background:var(--pu-d);}
</style>
</head>
<body>
<h1>Parallel Lines &amp; Angle Pairs Practice</h1>
<div class="mode-row">
  <button class="mode-btn active" id="mb0" onclick="setMode(0)"><span class="mode-num">Set 1</span>Identify the pair</button>
  <button class="mode-btn" id="mb1" onclick="setMode(1)"><span class="mode-num">Set 2</span>Congruent or sum?</button>
  <button class="mode-btn" id="mb2" onclick="setMode(2)"><span class="mode-num">Set 3</span>Solve for x</button>
  <button class="mode-btn" id="mb3" onclick="setMode(3)"><span class="mode-num">Set 4</span>Find the angle</button>
</div>
<div class="pbar"><div class="pfill" id="prog"></div></div>
<div class="qcard">
  <div class="qtop">
    <span class="qbadge" id="qbadge">Set 1 — Identify the pair</span>
    <div class="stats">
      <div class="stat">Correct: <strong id="sC">0</strong></div>
      <div class="stat">Total: <strong id="sT">0</strong></div>
    </div>
  </div>
  <canvas id="qc" width="560" height="300"></canvas>
  <div class="qtext" id="qtext"></div>
  <div class="mcgrid" id="mcgrid"></div>
  <div class="inrow" id="inrow" style="display:none;">
    <input type="number" id="ans" placeholder="Enter your answer" onkeydown="if(event.key==='Enter')checkFree()">
    <button class="chkbtn" onclick="checkFree()">Check</button>
  </div>
  <div class="fb" id="fb"></div>
  <button class="nxtbtn" id="nxtbtn" onclick="nextQ()">Next question →</button>
  <div class="done" id="done"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DIAGRAM — fixed pixel geometry, computed exactly.

   Canvas 560×300, background #f8faff.

   Two parallel horizontal lines:
     Line m:  y = 90,  from x=30 to x=530
     Line n:  y = 210, from x=30 to x=530

   Transversal: straight line at angle θ=55° above horizontal.
   We pick two exact intersection points:
     Top intersection:    (IX1=210, IY1=90)
     Bottom intersection: computed so the transversal passes
                          through both at the correct angle.
       IX2 = IX1 + (IY2-IY1)/tan(θ)
           = 210 + 120/tan(55°) ≈ 210 + 83.9 ≈ 294

   The transversal is extended 80px past each intersection.

   Angle numbering (standard textbook):
     At top intersection (I1):
       ∠1 = NE  (right of transversal, above line m)
       ∠2 = NW  (left of transversal,  above line m)
       ∠3 = SW  (left of transversal,  below line m) ← interior
       ∠4 = SE  (right of transversal, below line m) ← interior
     At bottom intersection (I2):
       ∠5 = NE  (right of transversal, above line n) ← interior
       ∠6 = NW  (left of transversal,  above line n) ← interior
       ∠7 = SW  (left of transversal,  below line n)
       ∠8 = SE  (right of transversal, below line n)

   At each intersection four rays meet:
     • Horizontal left  (angle = π)
     • Horizontal right (angle = 0)
     • Transversal up   (angle = π - θ_canvas)   going upper-right
     • Transversal down (angle = -θ_canvas)       going lower-right

   In canvas coordinates (y increases downward):
     Transversal going upper-right from intersection:
       dx>0, dy<0  →  angle = -θ (above horizontal)
     Transversal going lower-left (opposite direction):
       dx<0, dy>0  →  angle = π - θ  ... wait, let's just
       use atan2.  But we compute it directly:

   θ = 55°.  In canvas (y-down):
     transversal going UP-RIGHT:  ux = cos(55°), uy = -sin(55°)
     atan2(uy,ux) = atan2(-sin55, cos55) = -55° = -0.9599 rad
     So  T_UP = -θ_rad  (negative because y-down)
     T_DN = π + T_UP = π - θ_rad

   The four angular boundaries at each intersection (canvas angles):
     right  =  0
     T_UP   = -θ_rad          (transversal going upper-right)
     left   =  π
     T_DN   =  π - θ_rad      (transversal going lower-left)

   Sorted CW from east (canvas, where CW = increasing angle):
     T_UP   ≈ -0.96  →  same as  2π - 0.96 ≈ 5.32  (upper-right)
     right  =  0
     T_DN   =  π - 0.96 ≈ 2.18  (lower-left? No...)

   Let me think in degrees, CW from east (canvas):
     Horizontal right:    0°
     Trans upper-right: -55° ≡ 305°  (going up and to the right)
     Horizontal left:   180°
     Trans lower-left:  125°          (going down and to the left)

   So the four rays in CW order from 0°: 0°, 125°, 180°, 305°

   Quadrant angles (CW sweeps):
     ∠1 NE: from 305° to 360°(=0°) CW  → small acute angle above-right
     ∠2 NW: from 180° to 305° CW       → obtuse angle above-left
     ∠3 SW: from 125° to 180° CW       → small acute angle below-left
     ∠4 SE: from 0°   to 125° CW       → obtuse angle below-right

   In ctx.arc(cx,cy,r, startRad, endRad, anticlockwise):
     anticlockwise=false → draws CW (canvas)
     To draw "NE wedge" CW from 305° to 0°:
       ctx.arc(cx,cy,r, 305°, 360°, false)  — but 360°=0° wraps
       Use: arc(cx,cy,r, T_UP_rad, 0, false)  where T_UP_rad is negative
            = arc(cx,cy,r, -θ_rad, 0, false)  ✓

   For each sector we draw a filled pie slice:
     ctx.beginPath()
     ctx.moveTo(cx,cy)
     ctx.arc(...)
     ctx.closePath()
     fill + stroke arc only
═══════════════════════════════════════════════════ */

const DEG = Math.PI/180;
const THETA = 55;              /* transversal angle in degrees                */
const TH = THETA * DEG;        /* in radians                                  */

/* Intersection points — computed exactly from angle */
const IY1 = 90;
const IY2 = 210;
const IX1 = 210;
const IX2 = IX1 + (IY2 - IY1) / Math.tan(TH);   /* ≈ 294 */

/* Four ray angles at any intersection (canvas coords, y-down) */
/* Angles in radians, measured CW from east (standard canvas) */
const R_RIGHT = 0;
const R_T_UP  = -TH;               /* transversal going upper-right: -55°  */
const R_LEFT  = Math.PI;           /* 180°                                  */
const R_T_DN  = Math.PI - TH;      /* transversal going lower-left:  125°  */

/* Sectors: [startAngle, endAngle, anticlockwise]
   anticlockwise=false → CW sweep in canvas (visually correct CW)
   ∠1 NE: CW from T_UP (-55°) to RIGHT (0°)    */
const SECTORS = [
  [R_T_UP,  R_RIGHT, false],   /* 1 NE: -55° → 0°      acute, upper-right  */
  [R_LEFT,  R_T_UP,  true ],   /* 2 NW: 180° → -55°CCW  obtuse, upper-left  */
  [R_T_DN,  R_LEFT,  false],   /* 3 SW: 125° → 180°    acute, lower-left   */
  [R_RIGHT, R_T_DN,  false],   /* 4 SE: 0°   → 125°    obtuse, lower-right  */
];

/* Label offset directions for each angle (unit vector away from intersection) */
/* Midpoint of each sector determines where label goes */
const MID_ANGLES = [
  (-TH + 0) / 2,                     /* 1 NE mid ≈ -27.5° */
  (Math.PI + (2*Math.PI - TH)) / 2,  /* 2 NW mid ≈ 152.5° (going through 180° side) */
  (R_T_DN + Math.PI) / 2,            /* 3 SW mid ≈ 152.5° on other side? */
  (0 + R_T_DN) / 2,                  /* 4 SE mid ≈ 62.5°  */
];

/* Simpler: explicit label directions (unit vectors, canvas y-down) */
const LABEL_DIR = [
  { dx:  0.85, dy: -0.85 },   /* 1 NE */
  { dx: -0.85, dy: -0.85 },   /* 2 NW */
  { dx: -0.85, dy:  0.85 },   /* 3 SW */
  { dx:  0.85, dy:  0.85 },   /* 4 SE */
];

/* ── Angle pair definitions ─────────────────────── */
const PAIR_DEFS = [
  [1,5,'corresponding',      true, null],
  [2,6,'corresponding',      true, null],
  [3,7,'corresponding',      true, null],
  [4,8,'corresponding',      true, null],
  [3,5,'alt-interior',       true, null],
  [4,6,'alt-interior',       true, null],
  [1,7,'alt-exterior',       true, null],
  [2,8,'alt-exterior',       true, null],
  [4,5,'same-side-interior', false,180],
  [3,6,'same-side-interior', false,180],
  [1,2,'linear-pair',        false,180],
  [2,3,'linear-pair',        false,180],
  [3,4,'linear-pair',        false,180],
  [4,1,'linear-pair',        false,180],
  [5,6,'linear-pair',        false,180],
  [6,7,'linear-pair',        false,180],
  [7,8,'linear-pair',        false,180],
  [8,5,'linear-pair',        false,180],
  [1,3,'vertical',           true, null],
  [2,4,'vertical',           true, null],
  [5,7,'vertical',           true, null],
  [6,8,'vertical',           true, null],
];

const TYPE_LABELS = {
  'corresponding':      'Corresponding angles',
  'alt-interior':       'Alternate interior angles',
  'alt-exterior':       'Alternate exterior angles',
  'same-side-interior': 'Same-side interior angles',
  'linear-pair':        'Linear pair',
  'vertical':           'Vertical angles',
};
const ALL_LABELS = Object.values(TYPE_LABELS);
const TOTAL = 10;

let mode=0, score=0, total=0, answered=false, qCount=0, current=null;

const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=arr=>arr[ri(0,arr.length-1)];
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=ri(0,i);[b[i],b[j]]=[b[j],b[i]];}return b;};
const fmtE=(c,o)=>o===0?`${c}x`:o>0?`${c}x+${o}`:`${c}x${o}`;

/* ── Problem generator ── */
function gen(m){
  const [angA,angB,typeId,congruent,pSum] = pick(PAIR_DEFS);
  const label = TYPE_LABELS[typeId];

  if(m===0||m===1){
    const base=ri(25,150), aVal=base, bVal=congruent?base:180-base;
    return{angA,angB,typeId,label,congruent,pSum,aVal,bVal,mode:m};
  }
  if(m===2){
    const x=ri(5,22);
    let c1=ri(1,5),o1=ri(-8,20),c2,o2;
    if(congruent){
      c2=ri(1,4); o2=c1*x+o1-c2*x;
      if(Math.abs(o2)>44){c2=c1+1; o2=c1*x+o1-c2*x;}
    } else {
      c2=ri(1,4); o2=180-(c1+c2)*x-o1;
      if(o2<1||o2>65){c2=2; o2=180-(c1+c2)*x-o1;}
      if(o2<1) o2=5;
    }
    return{angA,angB,typeId,label,congruent,pSum,x,c1,o1,c2,o2,e1:fmtE(c1,o1),e2:fmtE(c2,o2),mode:2};
  }
  /* m===3 */
  const x=ri(5,20), c1=ri(1,4), o1=ri(4,24);
  let c2,o2;
  if(congruent){c2=c1+ri(1,2);o2=c1*x+o1-c2*x;if(o2<1)o2=3;}
  else{c2=ri(1,4);o2=180-(c1+c2)*x-o1;if(o2<1){c2=1;o2=180-(c1+c2)*x-o1;}if(o2<1)o2=4;}
  o2=Math.max(1,o2);
  const e1=`${c1}x+${o1}`,e2=`${c2}x+${o2}`;
  const a1=c1*x+o1,a2=c2*x+o2,askFirst=Math.random()<.5;
  return{angA,angB,typeId,label,congruent,pSum,x,c1,o1,c2,o2,e1,e2,a1,a2,askFirst,mode:3};
}

/* ── UI ── */
function setMode(m){
  mode=m;score=0;total=0;qCount=0;answered=false;
  ['mb0','mb1','mb2','mb3'].forEach((id,i)=>document.getElementById(id).classList.toggle('active',i===m));
  const labs=['Set 1 — Identify the pair','Set 2 — Congruent or sum?','Set 3 — Solve for x','Set 4 — Find the angle'];
  document.getElementById('qbadge').textContent=labs[m];
  document.getElementById('done').style.display='none';
  document.getElementById('qtext').style.display='';
  upStats(); nextQ();
}

function nextQ(){
  if(qCount>=TOTAL){showDone();return;}
  answered=false; current=gen(mode); qCount++;
  document.getElementById('prog').style.width=(qCount/TOTAL*100)+'%';
  document.getElementById('fb').className='fb';
  document.getElementById('nxtbtn').style.display='none';
  document.getElementById('done').style.display='none';
  document.getElementById('qtext').style.display='';
  render(current);
}

function render(p){
  drawDiagram(p);
  const isMC=(p.mode===0||p.mode===1);
  document.getElementById('mcgrid').style.display=isMC?'grid':'none';
  document.getElementById('inrow').style.display=isMC?'none':'flex';

  if(p.mode===0){
    document.getElementById('qtext').textContent=
      `Angles ${p.angA} and ${p.angB} are highlighted. What type of angle pair are they?`;
    const opts=shuf(ALL_LABELS);
    document.getElementById('mcgrid').innerHTML=
      opts.map(o=>`<button class="mcbtn" data-v="${o}" data-cor="${p.label}" onclick="checkMC(this)">${o}</button>`).join('');
  } else if(p.mode===1){
    document.getElementById('qtext').textContent=
      `Angles ${p.angA} and ${p.angB} are ${p.label.toLowerCase()}. Which property is correct?`;
    const cor=p.congruent?'They are congruent (equal)':'They add up to 180°';
    const opts=shuf(['They are congruent (equal)','They add up to 180°','They add up to 90°','None of these']);
    document.getElementById('mcgrid').innerHTML=
      opts.map(o=>`<button class="mcbtn" data-v="${o}" data-cor="${cor}" onclick="checkMC(this)">${o}</button>`).join('');
  } else if(p.mode===2){
    const rel=p.congruent?'congruent (equal)':'supplementary (add to 180°)';
    document.getElementById('qtext').innerHTML=
      `<strong>${p.label}</strong> are ${rel}.<br>
       <span style="color:#2563EB">∠${p.angA} = <strong>${p.e1}</strong></span>&nbsp;&nbsp;
       <span style="color:#B45309">∠${p.angB} = <strong>${p.e2}</strong></span><br>
       Set up the equation and solve for <em>x</em>.`;
    const inp=document.getElementById('ans');
    inp.value='';inp.className='';inp.placeholder='x = ?';
  } else {
    const rel=p.congruent?'congruent (equal)':'supplementary (add to 180°)';
    const aC=p.askFirst?'#2563EB':'#B45309', aE=p.askFirst?p.e1:p.e2;
    const gC=p.askFirst?'#B45309':'#2563EB', gE=p.askFirst?p.e2:p.e1;
    const gAng=p.askFirst?p.angB:p.angA, aAng=p.askFirst?p.angA:p.angB;
    document.getElementById('qtext').innerHTML=
      `<strong>${p.label}</strong> are ${rel}.<br>
       <span style="color:${gC}">∠${gAng} = <strong>${gE}</strong></span>&nbsp;&nbsp;
       Find the degree measure of <span style="color:${aC}">∠${aAng} = <strong>${aE}</strong></span>.`;
    const inp=document.getElementById('ans');
    inp.value='';inp.className='';inp.placeholder='angle = ?°';
  }
}

function checkMC(btn){
  if(answered)return;
  answered=true;total++;
  const correct=btn.dataset.cor, chosen=btn.dataset.v;
  document.querySelectorAll('.mcbtn').forEach(b=>{if(b.dataset.v===correct)b.classList.add('reveal');});
  if(chosen===correct){score++;btn.classList.add('correct');showFb(true,'Correct!');}
  else{btn.classList.add('wrong');showFb(false,`Not quite — correct answer: ${correct}`);}
  upStats();document.getElementById('nxtbtn').style.display='inline-block';
}

function checkFree(){
  if(answered)return;
  const inp=document.getElementById('ans'), val=parseFloat(inp.value);
  if(isNaN(val)){inp.placeholder='Enter a number';return;}
  answered=true;total++;
  const p=current, correct=p.mode===2?p.x:(p.askFirst?p.a1:p.a2);
  const ok=Math.abs(val-correct)<0.6;
  inp.className=ok?'correct':'wrong';
  if(ok){score++;showFb(true,'Correct! Great work.');}
  else if(p.mode===2){
    const eq=p.congruent?`${p.e1} = ${p.e2}`:`(${p.e1}) + (${p.e2}) = 180`;
    showFb(false,`Not quite. x = ${correct}. Equation: ${eq}`);
  } else showFb(false,`Not quite. The angle is ${correct}°. First find x = ${p.x}, then substitute.`);
  upStats();document.getElementById('nxtbtn').style.display='inline-block';
}

function showFb(ok,msg){const fb=document.getElementById('fb');fb.textContent=msg;fb.className=`fb show ${ok?'ok':'no'}`;}

function showDone(){
  ['qtext','mcgrid','inrow'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display='none';
  });
  document.getElementById('fb').className='fb';
  document.getElementById('nxtbtn').style.display='none';
  const pct=Math.round(score/TOTAL*100);
  const em=pct>=80?'🌟':pct>=60?'👍':'💪';
  const msg=pct>=80?'Excellent work!':pct>=60?'Good effort!':'Keep practicing!';
  const d=document.getElementById('done');d.style.display='block';
  d.innerHTML=`<div style="font-size:48px;margin-bottom:8px">${em}</div>
    <div class="done-score">${score} / ${TOTAL}</div>
    <div class="done-msg">${msg} (${pct}%)</div>
    <button class="rbtn" onclick="restart()">Try again</button>`;
  const ctx=document.getElementById('qc').getContext('2d');
  ctx.fillStyle='#f8faff';ctx.fillRect(0,0,560,300);
}

function restart(){
  score=0;total=0;qCount=0;answered=false;
  ['qtext','mcgrid'].forEach(id=>document.getElementById(id).style.display='');
  document.getElementById('done').style.display='none';
  upStats();nextQ();
}

function upStats(){document.getElementById('sC').textContent=score;document.getElementById('sT').textContent=total;}

/* ════════════════════════════════════════════════════
   CANVAS DRAWING — clean, explicit geometry
════════════════════════════════════════════════════ */
function drawDiagram(p){
  const cv=document.getElementById('qc'), ctx=cv.getContext('2d');
  const W=560, H=300;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f8faff';ctx.fillRect(0,0,W,H);

  const CA='#1d4ed8', CB='#92400e';   /* highlight colors: blue, amber */
  const LC='#1e293b';                  /* line color                    */

  /* ── utility functions ── */
  function drawLine(x1,y1,x2,y2,col,w){
    ctx.save();ctx.strokeStyle=col;ctx.lineWidth=w||2.5;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();
  }
  function drawArrowTip(x,y,angleRad,col){
    ctx.save();ctx.fillStyle=col;
    ctx.translate(x,y);ctx.rotate(angleRad);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-11,-5);ctx.lineTo(-11,5);ctx.closePath();
    ctx.fill();ctx.restore();
  }
  function drawParallelTick(x,y){
    /* two small tick marks crossing the line at angle */
    ctx.save();ctx.strokeStyle=LC;ctx.lineWidth=2;ctx.translate(x,y);
    for(let k=-1;k<=0;k++){
      ctx.save();ctx.translate(k*7,0);ctx.rotate(0.5);
      ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(0,8);ctx.stroke();ctx.restore();
    }
    ctx.restore();
  }
  function drawAngleSector(cx,cy,r,startA,endA,acw,col){
    ctx.save();
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startA,endA,acw);
    ctx.closePath();
    ctx.fillStyle=col;ctx.globalAlpha=0.25;ctx.fill();ctx.globalAlpha=1;
    ctx.strokeStyle=col;ctx.lineWidth=1.8;
    ctx.beginPath();ctx.arc(cx,cy,r,startA,endA,acw);ctx.stroke();
    ctx.restore();
  }
  function labelText(x,y,txt,col,size,weight){
    ctx.save();ctx.fillStyle=col;
    ctx.font=`${weight||500} ${size||12}px Poppins,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(txt,x,y);ctx.restore();
  }

  /* ── 1. Draw two parallel lines (horizontal) ── */
  const LX0=30, LX1=530;
  drawLine(LX0,IY1,LX1,IY1,LC,2.5);
  drawLine(LX0,IY2,LX1,IY2,LC,2.5);
  /* Arrowheads on each end */
  drawArrowTip(LX1,IY1,0,LC); drawArrowTip(LX0,IY1,Math.PI,LC);
  drawArrowTip(LX1,IY2,0,LC); drawArrowTip(LX0,IY2,Math.PI,LC);
  /* Parallel tick marks */
  drawParallelTick(100,IY1); drawParallelTick(100,IY2);
  /* Line labels */
  labelText(LX1+15,IY1,'m',LC,14,'italic 600');
  labelText(LX1+15,IY2,'n',LC,14,'italic 600');

  /* ── 2. Draw transversal ── */
  /* Direction vector (going lower-right, toward I2 from I1) */
  const tdx = IX2 - IX1;       /* positive */
  const tdy = IY2 - IY1;       /* positive (downward) */
  const tlen = Math.sqrt(tdx*tdx + tdy*tdy);
  const tux = tdx/tlen, tuy = tdy/tlen;   /* unit vector lower-right */

  const EXT = 85;   /* extension beyond each intersection */
  /* Upper-end coordinates (extend past I1 going upper-left) */
  const tx0 = IX1 - tux*EXT,  ty0 = IY1 - tuy*EXT;
  /* Lower-end coordinates (extend past I2 going lower-right) */
  const tx1 = IX2 + tux*EXT,  ty1 = IY2 + tuy*EXT;

  drawLine(tx0,ty0,tx1,ty1,LC,2.5);

  /* Arrowheads: upper-left tip and lower-right tip */
  const angUp   = Math.atan2(ty0-IY1, tx0-IX1);   /* pointing upper-left  */
  const angDown = Math.atan2(ty1-IY2, tx1-IX2);   /* pointing lower-right */
  drawArrowTip(tx0,ty0,angUp,LC);
  drawArrowTip(tx1,ty1,angDown,LC);

  /* Transversal label "t" near upper tip */
  labelText(tx0-12, ty0-4, 't', LC, 14,'italic 600');

  /* ── 3. Draw angle sectors and number labels ── */
  /* Angles at top intersection: 1(NE),2(NW),3(SW),4(SE) — offset 0
     Angles at bot intersection: 5(NE),6(NW),7(SW),8(SE) — offset 4  */
  drawIntersectionAngles(ctx,IX1,IY1,0,p,CA,CB,drawAngleSector,labelText);
  drawIntersectionAngles(ctx,IX2,IY2,4,p,CA,CB,drawAngleSector,labelText);

  /* Dots at intersections */
  [IX1,IX2].forEach((cx,i)=>{
    const cy=[IY1,IY2][i];
    ctx.beginPath();ctx.arc(cx,cy,4.5,0,2*Math.PI);
    ctx.fillStyle=LC;ctx.fill();
  });
}

function drawIntersectionAngles(ctx,cx,cy,offset,p,CA,CB,drawSector,lblFn){
  /* offset 0 → angles 1-4;  offset 4 → angles 5-8 */
  const R_SEC = 46;   /* arc radius for sector shading   */
  const R_NUM = 66;   /* radius for angle number label   */
  const R_VAL = 108;  /* radius for value/expr label     */

  for(let local=0;local<4;local++){
    const global = local + 1 + offset;   /* 1-8 */
    const isA = (global === p.angA);
    const isB = (global === p.angB);

    /* Draw shaded sector for highlighted angles */
    if(isA || isB){
      const col = isA ? CA : CB;
      const [s,e,acw] = SECTORS[local];
      drawSector(cx,cy,R_SEC,s,e,acw,col);
    }

    /* Angle number position */
    const ld = LABEL_DIR[local];
    const nx = cx + ld.dx * R_NUM;
    const ny = cy + ld.dy * R_NUM;

    /* Highlight background pill for highlighted angles */
    if(isA||isB){
      const col=isA?CA:CB;
      ctx.save();ctx.fillStyle=col;ctx.globalAlpha=0.15;
      ctx.beginPath();ctx.ellipse(nx,ny,14,11,0,0,2*Math.PI);ctx.fill();
      ctx.restore();
    }

    /* Angle number */
    const numCol = isA?CA : (isB?CB : '#64748b');
    const numWt  = (isA||isB)?'600':'500';
    lblFn(nx,ny,String(global),numCol,12,numWt);

    /* Value or expression label for highlighted angles */
    if(isA||isB){
      const vx = cx + ld.dx * R_VAL;
      const vy = cy + ld.dy * R_VAL;
      const col = isA ? CA : CB;
      let txt='';
      if(p.mode===2||p.mode===3){
        txt = isA ? p.e1 : p.e2;
      } else {
        txt = isA ? `${p.aVal}°` : `${p.bVal}°`;
      }
      /* Small rounded rect background */
      ctx.save();
      const tw = txt.length*7+10;
      ctx.fillStyle=col;ctx.globalAlpha=0.12;
      ctx.beginPath();ctx.roundRect(vx-tw/2,vy-10,tw,20,5);ctx.fill();
      ctx.globalAlpha=1;
      ctx.restore();
      lblFn(vx,vy,txt,col,12,'600');
    }
  }
}

setMode(0);
</script>
