
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unit Circle Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--surf:#0D1120;--surf2:#131929;--border:#1C2A40;--border2:#243350;
  --cyan:#22D3EE;--cyan-dim:rgba(34,211,238,0.1);--cyan-glow:rgba(34,211,238,0.07);
  --green:#34D399;--green-dim:rgba(52,211,153,0.1);
  --red:#F87171;--red-dim:rgba(248,113,113,0.1);
  --gold:#FBBF24;--gold-dim:rgba(251,191,36,0.1);
  --violet:#A78BFA;
  --text:#E2E8F0;--text-mid:#94A3B8;--text-dim:#64748B;--text-dark:#374151;
  --ff:'Syne',system-ui,sans-serif;--mono:'Space Mono',ui-monospace,monospace;
}
body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh}
#hdr{position:sticky;top:0;z-index:50;background:var(--surf);border-bottom:1px solid var(--border);
  padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-weight:800;font-size:17px;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.logo em{color:var(--cyan);font-style:normal}
#score-pill{font-family:var(--mono);font-size:12px;color:var(--cyan);background:var(--cyan-dim);
  padding:5px 12px;border-radius:20px;border:1px solid rgba(34,211,238,0.2);display:none}
#nav{background:var(--surf);border-bottom:1px solid var(--border);display:flex;padding:0 12px;overflow-x:auto}
.tb{padding:13px 16px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;
  color:var(--text-dim);font-family:var(--ff);font-weight:600;font-size:13px;white-space:nowrap;transition:all .15s}
.tb.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.tb:hover:not(.on){color:var(--text-mid)}
#main{max-width:960px;margin:0 auto;padding:24px 16px}
.pane{display:none}.pane.on{display:block}
.card{background:var(--surf);border-radius:16px;padding:18px 20px;border:1px solid var(--border)}
.label{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:1px;margin-bottom:10px}
.mono{font-family:var(--mono)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.btn{cursor:pointer;transition:all .15s;border:none;font-family:var(--ff)}
.btn:hover{opacity:.85}
.bcyan{background:var(--cyan);color:#07090F;font-weight:700;border-radius:10px;padding:10px 22px;font-size:13px}
.bghost{background:var(--surf2);color:var(--text-mid);font-weight:600;border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px}
/* Tips */
.tip-b{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  color:var(--text-mid);font-family:var(--ff);font-weight:600;font-size:12px;text-align:left;margin-bottom:5px;transition:all .15s}
.tip-b.open{border-radius:8px 8px 0 0;border-color:rgba(34,211,238,0.4);background:#162040;color:var(--text);margin-bottom:0}
.tip-body{background:var(--surf2);border:1px solid rgba(34,211,238,0.2);border-top:none;border-radius:0 0 8px 8px;
  padding:10px 13px;font-size:12px;color:var(--text-mid);line-height:1.65;display:none;margin-bottom:5px}
.tip-body.open{display:block}
/* Match */
.mc{padding:13px;border-radius:10px;cursor:pointer;background:var(--surf);border:2px solid var(--border);
  color:var(--text);font-family:var(--mono);font-size:14px;font-weight:700;text-align:center;transition:all .15s;display:block;width:100%}
.mc:hover:not(.mm){border-color:var(--border2);background:var(--surf2)}
.mc.msel{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan)}
.mc.mm{border-color:var(--green);background:var(--green-dim);color:var(--green);opacity:.7;cursor:default}
.mc.mw{border-color:var(--red);background:var(--red-dim);color:var(--red)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .35s ease}
/* Practice */
.cb{padding:16px 12px;border-radius:12px;cursor:pointer;background:var(--surf2);border:2px solid var(--border);
  color:var(--text);font-family:var(--mono);font-size:15px;font-weight:700;text-align:center;transition:all .15s;display:block;width:100%;min-height:58px}
.cb:hover:not(.fb){border-color:var(--cyan);background:var(--cyan-glow)}
.cb.ck{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.cb.cw{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.lvb{padding:8px 14px 6px;border-radius:8px;cursor:pointer;background:var(--surf2);border:1px solid var(--border);
  color:var(--text-dim);font-family:var(--ff);font-weight:700;font-size:12px;line-height:1.4;transition:all .15s}
.lvb.on{background:var(--cyan);border-color:var(--cyan);color:#07090F}
.setb{padding:7px 13px;border-radius:8px;cursor:pointer;background:var(--surf2);color:var(--text-dim);
  border:1px solid var(--border);font-family:var(--ff);font-weight:600;font-size:11.5px;transition:all .15s}
.setb.on{background:var(--cyan);border-color:var(--cyan);color:#07090F}
.pbar{height:5px;background:var(--surf2);border-radius:3px;overflow:hidden}
.pbar-f{height:100%;border-radius:3px;transition:width .5s}
.al-up{padding:10px 14px;background:var(--gold-dim);border:1px solid rgba(251,191,36,0.3);border-radius:10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.al-dn{padding:10px 14px;background:var(--red-dim);border:1px solid rgba(248,113,113,0.3);border-radius:10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
@media(max-width:640px){.g2{grid-template-columns:1fr}.g4r{grid-template-columns:1fr 1fr!important}#main{padding:16px 10px}}
</style>
</head>
<body>
<div id="hdr">
  <div class="logo">◎ Unit Circle <em>Mastery</em></div>
  <div id="score-pill" aria-live="polite"></div>
</div>
<nav id="nav">
  <button class="tb on" data-t="ov">📐 Overview</button>
  <button class="tb" data-t="mt">🃏 Matching</button>
  <button class="tb" data-t="pr">🎯 Practice</button>
  <button class="tb" data-t="pg">📊 Progress</button>
</nav>
<main id="main">

<!-- OVERVIEW -->
<section id="pane-ov" class="pane on">
  <div class="g2" style="align-items:start">
    <div class="card">
      <div class="label">INTERACTIVE UNIT CIRCLE</div>
      <p style="font-size:11px;color:var(--text-dark);margin-bottom:10px">Hover or click any point to explore its values</p>
      <svg id="ucsvg" viewBox="0 0 400 400" style="width:100%;max-width:380px;height:auto;display:block;margin:0 auto">
        <path id="qf1" fill="rgba(34,211,238,0.06)"/><path id="qf2" fill="rgba(167,139,250,0.06)"/>
        <path id="qf3" fill="rgba(52,211,153,0.06)"/><path id="qf4" fill="rgba(251,191,36,0.06)"/>
        <line x1="30" y1="200" x2="370" y2="200" stroke="#1E2A3A" stroke-width="1.5"/>
        <line x1="200" y1="30" x2="200" y2="370" stroke="#1E2A3A" stroke-width="1.5"/>
        <polygon points="370,200 362,196 362,204" fill="#1E2A3A"/>
        <polygon points="200,30 196,38 204,38" fill="#1E2A3A"/>
        <text x="376" y="204" fill="#334155" font-size="10" font-family="monospace">x</text>
        <text x="204" y="26" fill="#334155" font-size="10" font-family="monospace">y</text>
        <circle cx="200" cy="200" r="152" fill="none" stroke="#1E2A3A" stroke-width="1.5"/>
        <text x="255" y="148" fill="#22D3EE" font-size="13" font-weight="bold" text-anchor="middle" opacity=".45" style="pointer-events:none;font-family:Syne,sans-serif">I</text>
        <text x="145" y="148" fill="#A78BFA" font-size="13" font-weight="bold" text-anchor="middle" opacity=".45" style="pointer-events:none;font-family:Syne,sans-serif">II</text>
        <text x="145" y="263" fill="#34D399" font-size="13" font-weight="bold" text-anchor="middle" opacity=".45" style="pointer-events:none;font-family:Syne,sans-serif">III</text>
        <text x="255" y="263" fill="#FBBF24" font-size="13" font-weight="bold" text-anchor="middle" opacity=".45" style="pointer-events:none;font-family:Syne,sans-serif">IV</text>
        <g id="alines"></g>
        <line id="px" stroke="rgba(34,211,238,0.2)" stroke-width="1" stroke-dasharray="3,4" x1="0" y1="0" x2="0" y2="0"/>
        <line id="py" stroke="rgba(34,211,238,0.2)" stroke-width="1" stroke-dasharray="3,4" x1="0" y1="0" x2="0" y2="0"/>
        <path id="aarc" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity=".65"/>
        <g id="apts"></g>
        <g id="albls"></g>
        <circle cx="200" cy="200" r="3.5" fill="#22D3EE"/>
      </svg>
      <div style="display:flex;gap:14px;justify-content:center;margin-top:10px;flex-wrap:wrap">
        <span style="font-size:10px;color:#22D3EE;display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:#22D3EE;display:inline-block"></span>Q1</span>
        <span style="font-size:10px;color:#A78BFA;display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:#A78BFA;display:inline-block"></span>Q2</span>
        <span style="font-size:10px;color:#34D399;display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:#34D399;display:inline-block"></span>Q3</span>
        <span style="font-size:10px;color:#FBBF24;display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:#FBBF24;display:inline-block"></span>Q4</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="card" id="ainfo" style="transition:border-color .2s">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span class="mono" id="atitle" style="font-size:15px;font-weight:700;color:#22D3EE">30° = π/6</span>
          <span id="aquad" style="font-size:10px;color:var(--text-dim);background:var(--surf2);padding:3px 8px;border-radius:20px">Q1</span>
        </div>
        <div class="mono" style="font-size:11px;color:var(--text-dim);margin-bottom:12px">
          Point on circle: <span id="acoord" style="color:var(--text)"></span>
        </div>
        <div class="g3" id="fngrid"></div>
      </div>
      <div class="card">
        <div class="label">MEMORY TRICKS</div>
        <div id="tips"></div>
      </div>
    </div>
  </div>
</section>

<!-- MATCHING -->
<section id="pane-mt" class="pane">
  <div id="msetbtns" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div id="mhint" style="font-size:12px;color:var(--text-dim)"></div>
    <div id="mctr" class="mono" style="font-size:12px;color:var(--cyan)"></div>
  </div>
  <div id="mgame"></div>
</section>

<!-- PRACTICE -->
<section id="pane-pr" class="pane">
  <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px">
    <button class="lvb on" data-l="1">Level 1<div style="font-size:9px;font-weight:400;opacity:.7">Q1 · sin, cos, tan</div></button>
    <button class="lvb" data-l="2">Level 2<div style="font-size:9px;font-weight:400;opacity:.7">Q1 · All 6 functions</div></button>
    <button class="lvb" data-l="3">Level 3<div style="font-size:9px;font-weight:400;opacity:.7">All Quadrants · All 6</div></button>
    <div style="margin-left:auto;text-align:right;font-family:var(--mono);font-size:11px;color:var(--text-dim);line-height:1.9" id="pstats"></div>
  </div>
  <div id="bnup" class="al-up" style="display:none">
    <span style="font-size:13px;color:var(--gold)" id="bnut"></span>
    <button class="btn" id="blvup" style="padding:6px 14px;background:var(--gold);color:#07090F;border-radius:6px;font-weight:700;font-size:12px">Level Up →</button>
  </div>
  <div id="bndn" class="al-dn" style="display:none">
    <span style="font-size:13px;color:var(--red)" id="bndt"></span>
    <button class="btn" id="blvdn" style="padding:6px 14px;background:var(--red);color:#fff;border-radius:6px;font-weight:700;font-size:12px">Step Back</button>
  </div>
  <div class="card" id="qcard" style="text-align:center;padding:28px 24px;max-width:560px;margin:0 auto;transition:border-color .3s,box-shadow .3s">
    <div class="mono" style="font-size:10px;color:var(--text-dark);letter-spacing:1px;margin-bottom:14px" id="qtlbl">FIND THE VALUE</div>
    <div id="qdisplay" style="margin-bottom:20px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:380px;margin:0 auto" id="cgrid"></div>
    <div id="fba" style="display:none"></div>
  </div>
</section>

<!-- PROGRESS -->
<section id="pane-pg" class="pane">
  <div id="statcards" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px" class="g4r"></div>
  <div class="card" style="margin-bottom:18px">
    <div class="label">OVERALL ACCURACY</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--text-dim)">
      <span>Progress</span><span id="pctlbl" style="color:var(--cyan)">—</span>
    </div>
    <div class="pbar"><div class="pbar-f" id="mpbar" style="background:var(--cyan);width:0%"></div></div>
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="label">BY FUNCTION</div>
    <div id="fncards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px"></div>
  </div>
  <div class="card">
    <div class="label">RECENT HISTORY</div>
    <div id="hlist" style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:5px"></div>
    <div id="hempty" style="text-align:center;padding:24px;color:var(--text-dark);font-size:13px">No practice data yet — try the Practice tab!</div>
  </div>
</section>

</main>
<script>
// ═══════════ DATA ═══════════
const PC=['#22D3EE','#A78BFA','#34D399','#FBBF24'];
const A=[
  {d:0,  r:"0",    s:"0",    c:"1",     t:"0",     cs:"undef", sc:"1",      ct:"undef", coord:"(1, 0)",         q:1},
  {d:30, r:"π/6",  s:"1/2",  c:"√3/2",  t:"√3/3",  cs:"2",     sc:"2√3/3",  ct:"√3",    coord:"(√3/2, 1/2)",    q:1},
  {d:45, r:"π/4",  s:"√2/2", c:"√2/2",  t:"1",     cs:"√2",    sc:"√2",     ct:"1",     coord:"(√2/2, √2/2)",   q:1},
  {d:60, r:"π/3",  s:"√3/2", c:"1/2",   t:"√3",    cs:"2√3/3", sc:"2",      ct:"√3/3",  coord:"(1/2, √3/2)",    q:1},
  {d:90, r:"π/2",  s:"1",    c:"0",     t:"undef", cs:"1",     sc:"undef",  ct:"0",     coord:"(0, 1)",         q:1},
  {d:120,r:"2π/3", s:"√3/2", c:"-1/2",  t:"-√3",   cs:"2√3/3", sc:"-2",     ct:"-√3/3", coord:"(-1/2, √3/2)",   q:2},
  {d:135,r:"3π/4", s:"√2/2", c:"-√2/2", t:"-1",    cs:"√2",    sc:"-√2",    ct:"-1",    coord:"(-√2/2, √2/2)",  q:2},
  {d:150,r:"5π/6", s:"1/2",  c:"-√3/2", t:"-√3/3", cs:"2",     sc:"-2√3/3", ct:"-√3",   coord:"(-√3/2, 1/2)",   q:2},
  {d:180,r:"π",    s:"0",    c:"-1",    t:"0",     cs:"undef", sc:"-1",     ct:"undef", coord:"(-1, 0)",        q:2},
  {d:210,r:"7π/6", s:"-1/2", c:"-√3/2", t:"√3/3",  cs:"-2",    sc:"-2√3/3", ct:"√3",    coord:"(-√3/2, -1/2)",  q:3},
  {d:225,r:"5π/4", s:"-√2/2",c:"-√2/2", t:"1",     cs:"-√2",   sc:"-√2",    ct:"1",     coord:"(-√2/2, -√2/2)", q:3},
  {d:240,r:"4π/3", s:"-√3/2",c:"-1/2",  t:"√3",    cs:"-2√3/3",sc:"-2",     ct:"√3/3",  coord:"(-1/2, -√3/2)",  q:3},
  {d:270,r:"3π/2", s:"-1",   c:"0",     t:"undef", cs:"-1",    sc:"undef",  ct:"0",     coord:"(0, -1)",        q:3},
  {d:300,r:"5π/3", s:"-√3/2",c:"1/2",   t:"-√3",   cs:"-2√3/3",sc:"2",      ct:"-√3/3", coord:"(1/2, -√3/2)",   q:4},
  {d:315,r:"7π/4", s:"-√2/2",c:"√2/2",  t:"-1",    cs:"-√2",   sc:"√2",     ct:"-1",    coord:"(√2/2, -√2/2)",  q:4},
  {d:330,r:"11π/6",s:"-1/2", c:"√3/2",  t:"-√3/3", cs:"-2",    sc:"2√3/3",  ct:"-√3",   coord:"(√3/2, -1/2)",   q:4},
];
const FK={sin:'s',cos:'c',tan:'t',csc:'cs',sec:'sc',cot:'ct'};
const AV=["0","1","-1","1/2","-1/2","√2/2","-√2/2","√3/2","-√3/2","√3","-√3","√3/3","-√3/3","2","-2","√2","-√2","2√3/3","-2√3/3","undef"];
const AC=[...new Set(A.map(a=>a.coord))];
const LV={
  1:{lab:"Level 1",sub:"Q1 · sin, cos, tan",        qs:[1],       fns:['sin','cos','tan']},
  2:{lab:"Level 2",sub:"Q1 · All 6 functions",      qs:[1],       fns:['sin','cos','tan','csc','sec','cot']},
  3:{lab:"Level 3",sub:"All Quadrants · All 6",     qs:[1,2,3,4], fns:['sin','cos','tan','csc','sec','cot']},
};
const MS=[
  {t:"Degrees → Coordinates",h:"Match each angle to its (cos θ, sin θ) point on the circle",
   p:()=>A.filter(a=>a.q===1),lF:a=>`${a.d}°`,rF:a=>a.coord},
  {t:"Radians → Sine",h:"Match each radian measure to its sine value sin(θ)",
   p:()=>A.filter(a=>a.q===1),lF:a=>a.r,rF:a=>a.s},
  {t:"Degrees → Cosine",h:"Match each angle to its cosine value cos(θ)",
   p:()=>A.filter(a=>a.q===1),lF:a=>`${a.d}°`,rF:a=>a.c},
  {t:"Radians → Tangent",h:"Match each radian to tan(θ) — excludes 90°",
   p:()=>A.filter(a=>a.q===1&&a.d!==90),lF:a=>a.r,rF:a=>a.t},
];
const TIPS=[
  {i:"📍",t:"The Coordinate Connection",b:"Every point on the unit circle is (cos θ, sin θ). The x-coordinate is always cosine; y is always sine. Since the radius = 1, both stay between −1 and 1."},
  {i:"🔢",t:"The 1–2–3 Pattern",b:"Q1 sin values: √0/2, √1/2, √2/2, √3/2, √4/2 → 0, ½, √2/2, √3/2, 1 for 0°→90°. Cosine runs in reverse! This pattern eliminates memorization for Q1."},
  {i:"🔤",t:"CAST / ASTC Rule",b:"Signs by quadrant: All positive in Q1 · Sine (& csc) in Q2 · Tangent (& cot) in Q3 · Cosine (& sec) in Q4. Memory trick: 'All Students Take Calculus.'"},
  {i:"🔄",t:"Reference Angles",b:"Any angle outside Q1 has a reference angle — its distance from the nearest x-axis. For 150°, the reference is 30°. Same magnitude; apply CAST for the sign."},
  {i:"🥧",t:"Degree ↔ Radian Chart",b:"π/6=30° · π/4=45° · π/3=60° · π/2=90° · 2π/3=120° · 3π/4=135° · 5π/6=150° · π=180°. Formula: degrees × (π/180) = radians."},
  {i:"➗",t:"Tangent & Reciprocals",b:"tan θ = sin θ / cos θ (undefined when cos = 0, at 90° & 270°). Reciprocals: csc=1/sin, sec=1/cos, cot=1/tan. Key values: sec(60°)=2, csc(30°)=2, cot(45°)=1."},
];

// ═══════════ STATE ═══════════
const ST={
  tab:'ov',lvl:1,
  hov:null,sel:A[1],
  q:null,phase:'q',picked:null,
  stats:{correct:0,total:0,streak:0,best:0,
    byFn:{sin:{c:0,t:0},cos:{c:0,t:0},tan:{c:0,t:0},csc:{c:0,t:0},sec:{c:0,t:0},cot:{c:0,t:0},coord:{c:0,t:0}},
    hist:[]},
  mi:0,md:null,msel:null,mm:[],mw:null,mdone:false,mwrongs:0,
};

// ═══════════ HELPERS ═══════════
const sh=a=>[...a].sort(()=>Math.random()-.5);
const C=200,R=152;
const svgP=d=>{const r=d*Math.PI/180;return{x:C+R*Math.cos(r),y:C-R*Math.sin(r)};};
const svgL=d=>{const r=d*Math.PI/180;const l=R+26;return{x:C+l*Math.cos(r),y:C-l*Math.sin(r)};};
const pctC=p=>p>=80?'var(--green)':p>=60?'var(--gold)':'var(--red)';

function mkQ(lvl,hist){
  const{qs,fns}=LV[lvl],pool=A.filter(a=>qs.includes(a.q));
  if(Math.random()<0.2){
    const ang=pool[Math.floor(Math.random()*pool.length)];
    const ud=Math.random()>.4,as=ud?`${ang.d}°`:ang.r;
    const correct=ang.coord,wc=sh(AC.filter(c=>c!==correct)).slice(0,3);
    return{key:`${ang.d}_coord`,aStr:as,fn:'coord',ang,correct,choices:sh([correct,...wc])};
  }
  const wk=(hist||[]).filter(h=>!h.ok).slice(-6).map(h=>h.key);
  let ang,fn;
  if(wk.length&&Math.random()<0.4){
    const[ds,fs]=wk[Math.floor(Math.random()*wk.length)].split('_');
    const fa=pool.find(a=>a.d===+ds);
    if(fa&&fns.includes(fs)){ang=fa;fn=fs;}
  }
  if(!ang){ang=pool[Math.floor(Math.random()*pool.length)];fn=fns[Math.floor(Math.random()*fns.length)];}
  const ud=Math.random()>.4,as=ud?`${ang.d}°`:ang.r;
  const correct=ang[FK[fn]],wc=sh(AV.filter(v=>v!==correct)).slice(0,3);
  return{key:`${ang.d}_${fn}`,aStr:as,fn,ang,correct,choices:sh([correct,...wc])};
}

function mkMD(idx){
  const cfg=MS[idx],angs=cfg.p(),pairs=angs.map(a=>({l:cfg.lF(a),r:cfg.rF(a)}));
  return{pairs,rights:sh(pairs.map(p=>p.r))};
}

// ═══════════ SVG CIRCLE ═══════════
function initCircle(){
  [[0,90,0],[90,180,1],[180,270,2],[270,360,3]].forEach(([s,e,qi])=>{
    const sr=s*Math.PI/180,er=e*Math.PI/180;
    const x1=C+R*Math.cos(sr),y1=C-R*Math.sin(sr),x2=C+R*Math.cos(er),y2=C-R*Math.sin(er);
    $(`qf${qi+1}`).setAttribute('d',`M${C},${C} L${x1},${y1} A${R},${R} 0 0,0 ${x2},${y2} Z`);
  });
  const lg=$('alines'),pg=$('apts'),lg2=$('albls');
  A.forEach(a=>{
    const p=svgP(a.d),ns=svgNS;
    const line=document.createElementNS(ns,'line');
    line.id=`al-${a.d}`;[['x1',C],['y1',C],['x2',p.x],['y2',p.y],
      ['stroke','#1E2A3A'],['stroke-width','1'],['stroke-dasharray','3,6']].forEach(([k,v])=>line.setAttribute(k,v));
    lg.appendChild(line);
    const pt=document.createElementNS(ns,'circle');
    pt.id=`ap-${a.d}`;[['cx',p.x],['cy',p.y],['r','5'],['fill','#0D1120'],
      ['stroke',PC[a.q-1]],['stroke-width','1.5']].forEach(([k,v])=>pt.setAttribute(k,v));
    pt.style.cursor='pointer';pt.style.transition='all .12s';
    pt.addEventListener('mouseenter',()=>{ST.hov=a;updCircle();updPanel(a);});
    pt.addEventListener('mouseleave',()=>{ST.hov=null;updCircle();updPanel(ST.sel);});
    pt.addEventListener('click',()=>{ST.sel=a;updCircle();updPanel(a);});
    pg.appendChild(pt);
    if(a.d%30===0){
      const lp=svgL(a.d),t=document.createElementNS(ns,'text');
      t.id=`alb-${a.d}`;t.textContent=`${a.d}°`;
      [['x',lp.x],['y',lp.y+3],['fill','#334155'],['font-size','8.5'],
       ['font-family','Space Mono,monospace'],['text-anchor','middle']].forEach(([k,v])=>t.setAttribute(k,v));
      t.style.pointerEvents='none';t.style.transition='fill .15s';
      lg2.appendChild(t);
    }
  });
  updCircle();updPanel(A[1]);
}

const svgNS='http://www.w3.org/2000/svg';
const $=id=>document.getElementById(id);

function updCircle(){
  const act=ST.hov||ST.sel;
  A.forEach(a=>{
    const isH=ST.hov?.d===a.d,isS=ST.sel?.d===a.d,ia=isH||isS,qc=PC[a.q-1];
    const l=$(`al-${a.d}`);
    if(l){l.setAttribute('stroke',ia?qc:'#1E2A3A');l.setAttribute('stroke-width',ia?'1.5':'1');l.setAttribute('stroke-dasharray',ia?'none':'3,6');}
    const p=$(`ap-${a.d}`);
    if(p){p.setAttribute('r',isH?'7':isS?'6':'5');p.setAttribute('fill',ia?qc:'#0D1120');p.setAttribute('stroke-width',isH?'2.5':isS?'2':'1.5');}
    const lb=$(`alb-${a.d}`);
    if(lb) lb.setAttribute('fill',ia?'#22D3EE':'#334155');
  });
  if(act&&act.d>0&&act.d<360){
    const p=svgP(act.d);
    $('px').setAttribute('x1',C);$('px').setAttribute('y1',p.y);$('px').setAttribute('x2',p.x);$('px').setAttribute('y2',p.y);
    $('py').setAttribute('x1',p.x);$('py').setAttribute('y1',C);$('py').setAttribute('x2',p.x);$('py').setAttribute('y2',p.y);
    const er=act.d*Math.PI/180,lg=act.d>180?1:0,ax=C+40*Math.cos(er),ay=C-40*Math.sin(er);
    $('aarc').setAttribute('d',`M${C+40},${C} A40,40 0 ${lg},0 ${ax},${ay}`);
  } else {
    ['px','py'].forEach(id=>{const e=$(id);['x1','y1','x2','y2'].forEach(a=>e.setAttribute(a,'0'));});
    $('aarc').setAttribute('d','');
  }
}

function updPanel(a){
  if(!a) a=A[1];
  const qc=PC[a.q-1];
  $('atitle').textContent=`${a.d}° = ${a.r}`;$('atitle').style.color=qc;
  $('aquad').textContent=`Q${a.q}`;$('acoord').textContent=a.coord;
  $('ainfo').style.borderColor=ST.hov?qc:'var(--border)';
  const cols=['#22D3EE','#A78BFA','#FBBF24','#22D3EE','#A78BFA','#FBBF24'];
  $('fngrid').innerHTML=[{k:'sin',v:a.s},{k:'cos',v:a.c},{k:'tan',v:a.t},{k:'csc',v:a.cs},{k:'sec',v:a.sc},{k:'cot',v:a.ct}]
    .map(({k,v},i)=>`<div style="background:var(--surf2);border-radius:7px;padding:7px 5px;text-align:center;border:1px solid var(--border)">
      <div style="font-size:8.5px;color:var(--text-dim);font-family:var(--mono);margin-bottom:2px">${k}</div>
      <div style="font-size:11px;font-weight:700;color:${v==='undef'?'var(--text-dark)':cols[i]};font-family:var(--mono)">${v}</div></div>`).join('');
}

// ═══════════ TIPS ═══════════
function initTips(){
  $('tips').innerHTML=TIPS.map((t,i)=>`
    <div><button class="tip-b" data-ti="${i}"><span>${t.i} ${t.t}</span><span style="font-size:9px;color:var(--text-dark)">▼</span></button>
    <div class="tip-body" data-tb="${i}">${t.b}</div></div>`).join('');
  $('tips').addEventListener('click',e=>{
    const b=e.target.closest('[data-ti]');if(!b)return;const idx=b.dataset.ti;
    const body=document.querySelector(`[data-tb="${idx}"]`),was=body.classList.contains('open');
    document.querySelectorAll('.tip-b,.tip-body').forEach(el=>el.classList.remove('open'));
    if(!was){b.classList.add('open');body.classList.add('open');}
  });
}

// ═══════════ MATCHING ═══════════
function initMSets(){
  $('msetbtns').innerHTML=MS.map((m,i)=>`<button class="setb${i===0?' on':''}" data-mi="${i}">${m.t}</button>`).join('');
  $('msetbtns').addEventListener('click',e=>{
    const b=e.target.closest('[data-mi]');if(!b)return;
    document.querySelectorAll('.setb').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    ST.mi=+b.dataset.mi;resetM();renderM();
  });
}

function resetM(idx){
  ST.md=mkMD(idx!==undefined?idx:ST.mi);
  ST.msel=null;ST.mm=[];ST.mw=null;ST.mdone=false;ST.mwrongs=0;
}

function renderM(){
  $('mhint').textContent=MS[ST.mi].h;
  $('mctr').textContent=`${ST.mm.length}/${ST.md.pairs.length} matched`;
  const g=$('mgame');
  if(ST.mdone){
    g.innerHTML=`<div style="text-align:center;padding:44px 24px;background:var(--surf);border-radius:20px;border:2px solid var(--green)">
      <div style="font-size:48px;margin-bottom:12px">🎉</div>
      <div style="font-size:24px;font-weight:800;color:var(--green);margin-bottom:6px">All Matched!</div>
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:20px">${ST.mwrongs===0?'Perfect — no wrong guesses!':'Completed with '+ST.mwrongs+' wrong attempt'+(ST.mwrongs>1?'s':'')+'.'}</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn bcyan" id="mrp">Play Again</button>
        <button class="btn bghost" id="mnx">Next Set →</button>
      </div></div>`;
    $('mrp').onclick=()=>{resetM();renderM();};
    $('mnx').onclick=()=>{
      const ni=(ST.mi+1)%MS.length;
      document.querySelectorAll('.setb').forEach((b,i)=>b.classList.toggle('on',i===ni));
      ST.mi=ni;resetM(ni);renderM();
    };
    return;
  }
  g.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div><div class="label">ANGLES</div><div id="mlefts" style="display:flex;flex-direction:column;gap:8px"></div></div>
    <div><div class="label">VALUES</div><div id="mrights" style="display:flex;flex-direction:column;gap:8px"></div></div></div>`;
  ST.md.pairs.forEach((pair,i)=>{
    const isM=ST.mm.includes(i),isS=ST.msel===i;
    const b=document.createElement('button');
    b.className='mc'+(isM?' mm':isS?' msel':'');b.textContent=pair.l+(isM?' ✓':'');
    if(!isM) b.onclick=()=>{ST.msel=(ST.msel===i?null:i);renderM();};
    $('mlefts').appendChild(b);
  });
  ST.md.rights.forEach((val,i)=>{
    const isM=ST.mm.some(mi=>ST.md.pairs[mi].r===val),isW=ST.mw===i;
    const b=document.createElement('button');
    b.className='mc'+(isM?' mm':isW?' mw shake':'');b.textContent=val+(isM?' ✓':'');
    if(!isM) b.onclick=()=>mClick(val,i);
    $('mrights').appendChild(b);
  });
}

function mClick(val,idx){
  if(ST.msel===null||ST.mdone)return;
  const pair=ST.md.pairs[ST.msel];
  if(pair.r===val){
    ST.mm=[...ST.mm,ST.msel];ST.msel=null;
    if(ST.mm.length===ST.md.pairs.length)ST.mdone=true;
    renderM();
  } else {
    ST.mwrongs++;ST.mw=idx;renderM();
    setTimeout(()=>{ST.mw=null;renderM();},700);
  }
}

// ═══════════ PRACTICE ═══════════
function renderPr(){
  const s=ST.stats,pct=s.total>0?Math.round(100*s.correct/s.total):null;
  const lvlUp=s.streak>=5&&ST.lvl<3,lvlDn=s.total>=8&&s.total>0&&(s.correct/s.total)<0.4&&ST.lvl>1;
  $('pstats').innerHTML=pct!==null
    ?`<div style="color:var(--cyan)">${s.correct}/${s.total} correct · ${pct}%</div><div>🔥 streak: ${s.streak} · best: ${s.best}</div>`
    :'Answer questions to track progress';
  $('bnup').style.display=lvlUp?'flex':'none';
  $('bndn').style.display=lvlDn?'flex':'none';
  if(lvlUp){$('bnut').textContent=`🔥 ${s.streak} in a row! Ready for Level ${ST.lvl+1}?`;$('blvup').onclick=()=>setLvl(ST.lvl+1);}
  if(lvlDn){$('bndt').textContent=`💡 Want to review Level ${ST.lvl-1} a bit more?`;$('blvdn').onclick=()=>setLvl(ST.lvl-1);}
  const q=ST.q,isC=q.fn==='coord',ok=ST.phase==='fb'&&ST.picked===q.correct;
  $('qcard').style.borderColor=ST.phase==='fb'?(ok?'var(--green)':'var(--red)'):'var(--border)';
  $('qcard').style.boxShadow=ST.phase==='fb'?(ok?'0 0 28px rgba(52,211,153,0.1)':'0 0 28px rgba(248,113,113,0.1)'):'none';
  $('qtlbl').textContent=isC?'FIND THE COORDINATE':'FIND THE VALUE';
  $('qdisplay').innerHTML=isC
    ?`<div style="font-size:22px;font-weight:800;color:var(--text)">Coordinate of <span style="color:var(--cyan)">${q.aStr}</span></div><div style="font-size:13px;color:var(--text-dark);margin-top:4px">= ?</div>`
    :`<div style="font-size:36px;font-weight:800;font-family:var(--mono);color:var(--cyan);letter-spacing:-1px">${q.fn}(${q.aStr})</div><div style="font-size:13px;color:var(--text-dark);margin-top:2px">= ?</div>`;
  const cg=$('cgrid');cg.innerHTML='';
  q.choices.forEach(ch=>{
    let cls='cb';
    if(ST.phase==='fb'){cls+=' fb';if(ch===q.correct)cls+=' ck';else if(ch===ST.picked)cls+=' cw';}
    const b=document.createElement('button');b.className=cls;b.textContent=ch;
    if(ST.phase==='q') b.onclick=()=>ansQ(ch);
    cg.appendChild(b);
  });
  const fa=$('fba');
  if(ST.phase==='fb'){
    fa.style.display='block';
    const qc=`Q${q.ang.q} (${['','all positive','sin+ only','tan+ only','cos+ only'][q.ang.q]})`;
    fa.innerHTML=`<div style="margin-top:16px;padding:13px 16px;border-radius:10px;
      background:${ok?'var(--green-dim)':'var(--red-dim)'};border:1px solid ${ok?'rgba(52,211,153,0.25)':'rgba(248,113,113,0.25)'};
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;text-align:left">
      <div><div style="font-weight:700;color:${ok?'var(--green)':'var(--red)'};font-size:15px;margin-bottom:${ok?0:6}px">${ok?'✓ Correct!':'✗ Incorrect'}</div>
      ${!ok?`<div style="font-size:11px;color:var(--text-dim);line-height:1.6">
        Correct: <span style="color:var(--text);font-family:var(--mono)">${q.correct}</span><br>
        For ${q.ang.d}°: sin=${q.ang.s}, cos=${q.ang.c}, tan=${q.ang.t}<br>
        <span style="color:var(--text-dim)">${qc}</span>
      </div>`:''}
      </div>
      <button class="btn bcyan" id="nbtn" style="flex-shrink:0">Next →</button></div>`;
    $('nbtn').onclick=()=>nextQ();
  } else fa.style.display='none';
}

function ansQ(ch){
  if(ST.phase!=='q')return;
  const ok=ch===ST.q.correct,ns=ok?ST.stats.streak+1:0;
  const bf={...ST.stats.byFn},fn=ST.q.fn;
  bf[fn]={c:bf[fn].c+(ok?1:0),t:bf[fn].t+1};
  ST.stats={...ST.stats,correct:ST.stats.correct+(ok?1:0),total:ST.stats.total+1,streak:ns,
    best:Math.max(ST.stats.best,ns),byFn:bf,
    hist:[...ST.stats.hist,{key:ST.q.key,fn,deg:ST.q.ang.d,correct:ST.q.correct,picked:ch,ok}].slice(-50)};
  ST.picked=ch;ST.phase='fb';renderPr();updPill();
}

function nextQ(){ST.q=mkQ(ST.lvl,ST.stats.hist);ST.phase='q';ST.picked=null;renderPr();}

function setLvl(l){
  ST.lvl=l;document.querySelectorAll('.lvb').forEach(b=>b.classList.toggle('on',+b.dataset.l===l));
  ST.q=mkQ(l,ST.stats.hist);ST.phase='q';ST.picked=null;renderPr();
}

// ═══════════ PROGRESS ═══════════
function renderPg(){
  const s=ST.stats,pct=s.total>0?Math.round(100*s.correct/s.total):null,pc=pct!==null?pctC(pct):'var(--text-dim)';
  $('statcards').innerHTML=[
    {l:'Accuracy',v:pct!==null?`${pct}%`:'—',c:pc,s:`${s.correct}/${s.total} correct`},
    {l:'Best Streak',v:s.best||'—',c:'var(--gold)',s:'consecutive correct'},
    {l:'Streak Now',v:s.streak||'—',c:'var(--cyan)',s:'in a row'},
    {l:'Level',v:LV[ST.lvl].lab,c:'var(--violet)',s:LV[ST.lvl].sub},
  ].map(({l,v,c,s})=>`<div style="background:var(--surf);border-radius:12px;padding:15px;border:1px solid var(--border)">
    <div style="font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:.5px;margin-bottom:8px">${l.toUpperCase()}</div>
    <div style="font-size:26px;font-weight:800;color:${c};font-family:var(--mono);line-height:1;margin-bottom:4px">${v}</div>
    <div style="font-size:10px;color:var(--text-dark);line-height:1.3">${s}</div></div>`).join('');
  $('pctlbl').textContent=pct!==null?`${pct}%`:'—';
  if(pct!==null){$('mpbar').style.width=`${pct}%`;$('mpbar').style.background=pc;}
  const fns=['sin','cos','tan','csc','sec','cot','coord'];
  $('fncards').innerHTML=fns.map(fn=>{
    const d=s.byFn[fn],fp=d.t>0?Math.round(100*d.c/d.t):null,fc=fp!==null?pctC(fp):'var(--text-dark)';
    return`<div style="background:var(--surf2);border-radius:10px;padding:12px;border:1px solid var(--border)">
      <div style="font-family:var(--mono);color:var(--cyan);font-size:12px;font-weight:700;margin-bottom:5px">${fn==='coord'?'coord':fn+'(θ)'}</div>
      <div style="font-size:22px;font-weight:800;color:${fc};font-family:var(--mono);line-height:1;margin-bottom:3px">${fp!==null?fp+'%':'—'}</div>
      <div style="font-size:9px;color:var(--text-dark)">${d.c}/${d.t}</div>
      ${d.t>0?`<div style="margin-top:7px;height:3px;background:var(--border);border-radius:2px"><div style="height:100%;background:${fc};border-radius:2px;width:${fp}%"></div></div>`:''}</div>`;
  }).join('');
  const hl=$('hlist'),he=$('hempty');
  if(s.hist.length===0){hl.style.display='none';he.style.display='block';}
  else{
    hl.style.display='flex';he.style.display='none';
    hl.innerHTML=[...s.hist].reverse().slice(0,20).map(h=>`
      <div style="padding:7px 12px;border-radius:7px;display:flex;justify-content:space-between;align-items:center;
        background:${h.ok?'rgba(52,211,153,0.04)':'rgba(248,113,113,0.04)'};
        border:1px solid ${h.ok?'rgba(52,211,153,0.15)':'rgba(248,113,113,0.15)'}">
        <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">${h.fn}(${h.deg}°)</span>
        <div style="display:flex;gap:8px;align-items:center">
          ${!h.ok?`<span style="font-family:var(--mono);font-size:10px;color:var(--red)">✗ ${h.picked}</span>`:''}
          <span style="font-family:var(--mono);font-size:11px;color:${h.ok?'var(--green)':'var(--text-mid)'}">${h.ok?'✓ ':''} ${h.correct}</span>
        </div></div>`).join('');
  }
}

function updPill(){
  const s=ST.stats;if(!s.total)return;
  const p=Math.round(100*s.correct/s.total),el=$('score-pill');
  el.style.display='block';el.textContent=`${s.correct}/${s.total} · ${p}% · 🔥${s.streak}`;
}

// ═══════════ TABS ═══════════
function goTab(t){
  ST.tab=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id===`pane-${t}`));
  if(t==='mt'){if(!ST.md)resetM(0);renderM();}
  if(t==='pr'){if(!ST.q)ST.q=mkQ(ST.lvl,ST.stats.hist);renderPr();}
  if(t==='pg')renderPg();
}
document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>goTab(b.dataset.t)));
document.querySelectorAll('.lvb').forEach(b=>b.addEventListener('click',()=>setLvl(+b.dataset.l)));

// ═══════════ BOOT ═══════════
initCircle();initTips();initMSets();
</script>
</body>
</html>
