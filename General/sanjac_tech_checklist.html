
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start of Semester Technology Checklist</title>
<style>
  /* Self-contained styles — safe for Blackboard Ultra HTML embed */
  #sjc-checklist * { box-sizing: border-box; margin: 0; padding: 0; }
  #sjc-checklist {
    font-family: Georgia, 'Times New Roman', serif;
    max-width: 700px;
    margin: 0 auto;
    padding: 24px 20px 32px;
    color: #1a1a1a;
    background: #ffffff;
  }
  #sjc-checklist .cl-page-title {
    font-size: 22px;
    font-weight: bold;
    color: #003366;
    border-bottom: 3px solid #003366;
    padding-bottom: 10px;
    margin-bottom: 6px;
    font-family: Georgia, serif;
  }
  #sjc-checklist .cl-subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 18px;
    font-family: Arial, sans-serif;
  }

  /* Semester selector */
  #sjc-checklist .cl-sem-label {
    font-size: 13px;
    font-weight: bold;
    color: #333;
    font-family: Arial, sans-serif;
    margin-bottom: 8px;
  }
  #sjc-checklist .cl-sem-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  #sjc-checklist .cl-sem-btn {
    padding: 8px 18px;
    border: 2px solid #003366;
    background: #ffffff;
    color: #003366;
    font-size: 13px;
    font-weight: bold;
    font-family: Arial, sans-serif;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }
  #sjc-checklist .cl-sem-btn:hover {
    background: #e8eef5;
  }
  #sjc-checklist .cl-sem-btn.cl-active {
    background: #003366;
    color: #ffffff;
  }

  /* Time commitment banner */
  #sjc-checklist .cl-time-banner {
    background: #eaf3fb;
    border-left: 4px solid #1a6db5;
    padding: 12px 16px;
    border-radius: 0 4px 4px 0;
    margin-bottom: 20px;
    font-family: Arial, sans-serif;
  }
  #sjc-checklist .cl-time-banner .cl-tb-heading {
    font-size: 14px;
    font-weight: bold;
    color: #003366;
    margin-bottom: 3px;
  }
  #sjc-checklist .cl-time-banner .cl-tb-body {
    font-size: 13px;
    color: #1a4a7a;
    line-height: 1.5;
  }

  /* Progress bar */
  #sjc-checklist .cl-progress-wrap {
    margin-bottom: 22px;
  }
  #sjc-checklist .cl-progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
    font-family: Arial, sans-serif;
    margin-bottom: 6px;
  }
  #sjc-checklist .cl-progress-track {
    height: 8px;
    background: #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
  }
  #sjc-checklist .cl-progress-fill {
    height: 100%;
    background: #1a6db5;
    border-radius: 4px;
    transition: width 0.3s;
    width: 0%;
  }

  /* Sections */
  #sjc-checklist .cl-section {
    border: 1px solid #d0d7e0;
    border-radius: 6px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  #sjc-checklist .cl-section-header {
    background: #f0f4f9;
    padding: 10px 14px;
    border-bottom: 1px solid #d0d7e0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #sjc-checklist .cl-section-title {
    font-size: 14px;
    font-weight: bold;
    color: #003366;
    font-family: Arial, sans-serif;
  }
  #sjc-checklist .cl-section-count {
    font-size: 12px;
    color: #666;
    font-family: Arial, sans-serif;
  }

  /* Checklist items */
  #sjc-checklist .cl-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    border-bottom: 1px solid #e8ecf0;
    cursor: pointer;
    transition: background 0.1s;
    font-family: Arial, sans-serif;
  }
  #sjc-checklist .cl-item:last-child { border-bottom: none; }
  #sjc-checklist .cl-item:hover { background: #f7f9fb; }
  #sjc-checklist .cl-item.cl-checked { opacity: 0.6; }

  #sjc-checklist .cl-checkbox {
    width: 20px;
    height: 20px;
    min-width: 20px;
    border: 2px solid #999;
    border-radius: 3px;
    margin-top: 1px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    font-size: 13px;
    color: white;
    font-weight: bold;
  }
  #sjc-checklist .cl-item.cl-checked .cl-checkbox {
    background: #1a6db5;
    border-color: #1a6db5;
  }
  #sjc-checklist .cl-checkmark { display: none; }
  #sjc-checklist .cl-item.cl-checked .cl-checkmark { display: block; }

  #sjc-checklist .cl-item-body { flex: 1; }
  #sjc-checklist .cl-item-label {
    font-size: 14px;
    color: #1a1a1a;
    line-height: 1.45;
  }
  #sjc-checklist .cl-item-note {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
    line-height: 1.5;
    font-style: italic;
  }

  /* Done state */
  #sjc-checklist .cl-all-done {
    display: none;
    text-align: center;
    padding: 24px;
    background: #eaf5ea;
    border: 1px solid #a3d4a3;
    border-radius: 6px;
    margin-top: 8px;
  }
  #sjc-checklist .cl-all-done p {
    font-size: 16px;
    font-weight: bold;
    color: #2a6b2a;
    font-family: Arial, sans-serif;
  }

  /* Print */
  #sjc-checklist .cl-print-btn {
    margin-top: 18px;
    padding: 9px 20px;
    background: #f0f4f9;
    border: 1px solid #aabbcc;
    border-radius: 4px;
    font-size: 13px;
    color: #003366;
    font-family: Arial, sans-serif;
    cursor: pointer;
    font-weight: bold;
  }
  #sjc-checklist .cl-print-btn:hover { background: #e0eaf5; }

  @media print {
    #sjc-checklist .cl-sem-buttons,
    #sjc-checklist .cl-progress-wrap,
    #sjc-checklist .cl-print-btn { display: none !important; }
    #sjc-checklist .cl-item { break-inside: avoid; }
  }
</style>
</head>
<body>

<div id="sjc-checklist">

  <div class="cl-page-title">Start of Semester: Technology Checklist</div>
  <p class="cl-subtitle">Complete all items before your first assignment is due. Select your semester length to see the time commitment for this course.</p>

  <p class="cl-sem-label">Select your semester length:</p>
  <div class="cl-sem-buttons">
    <button class="cl-sem-btn" data-weeks="16">16 weeks</button>
    <button class="cl-sem-btn cl-active" data-weeks="12">12 weeks</button>
    <button class="cl-sem-btn" data-weeks="10">10 weeks</button>
    <button class="cl-sem-btn" data-weeks="5">5 weeks</button>
  </div>

  <div class="cl-time-banner">
    <div class="cl-tb-heading" id="clBannerHeading"></div>
    <div class="cl-tb-body" id="clBannerBody"></div>
  </div>

  <div class="cl-progress-wrap">
    <div class="cl-progress-label">
      <span>Checklist progress</span>
      <span id="clProgressText">0 / 0 complete</span>
    </div>
    <div class="cl-progress-track">
      <div class="cl-progress-fill" id="clProgressFill"></div>
    </div>
  </div>

  <div id="clSections"></div>

  <div class="cl-all-done" id="clAllDone">
    <p>&#10003; You are all set for the semester &mdash; good luck!</p>
  </div>

  <button class="cl-print-btn" onclick="window.print()">&#128438; Print this checklist</button>

</div>

<script>
(function () {
  var timeInfo = {
    16: {
      heading: "16-week semester: 6\u20139 hours per week",
      body: "Plan for roughly one to one and a half hours of focused study each day. Consistency throughout the semester is key."
    },
    12: {
      heading: "12-week semester: 8\u201312 hours per week",
      body: "This is a faster pace than a traditional semester. Missing a single week puts you significantly behind \u2014 protect your study time."
    },
    10: {
      heading: "10-week semester: 10\u201314 hours per week",
      body: "At this pace, expect roughly two hours of study most days. Build this into your daily routine and let family or employers know about your schedule demands."
    },
    5: {
      heading: "5-week semester: 20\u201330 hours per week",
      body: "This is an intensive format equivalent to a full-time job. Day-by-day planning is essential. Minimize other major commitments if at all possible during this term."
    }
  };

  var staticSections = [
    {
      title: "Computer & internet access",
      items: [
        { label: "I have access to a dedicated computer (desktop or laptop)", note: "A smartphone or tablet alone is not sufficient. While some tasks can be done on mobile, most assignments, quizzes, and exams require a full computer." },
        { label: "My computer has a reliable, consistent internet connection", note: "Mobile hotspots may work in a pinch but are not recommended as your primary connection." },
        { label: "My computer has a functioning webcam", note: "Required for proctored exams through Honorlock. Built-in laptop cameras are fine; external USB webcams also work." },
        { label: "I have a backup device I can use if my computer fails", note: "This could be a parent\u2019s, spouse\u2019s, friend\u2019s, or relative\u2019s computer. Know in advance who you can call \u2014 before an emergency happens." },
        { label: "I have a backup internet option if my connection goes down", note: "A neighbor\u2019s home, a local library, a family member\u2019s house, or a campus computer lab. Identify this now, not during a crisis." }
      ]
    },
    {
      title: "Google Chrome & Honorlock",
      items: [
        { label: "Google Chrome is installed on my computer", note: "Honorlock requires Google Chrome. Other browsers (Firefox, Safari, Edge) will NOT work for proctored exams. Download for free at google.com/chrome." },
        { label: "Chrome is updated to the latest version", note: "In Chrome, click the three-dot menu \u2192 Help \u2192 About Google Chrome. It will update automatically if an update is available." },
        { label: "I have installed the Honorlock Chrome extension", note: "Search \u201cHonorlock\u201d in the Chrome Web Store and add the extension. You will need it active before starting any proctored exam." },
        { label: "I have tested Honorlock before my first exam", note: "Run the Honorlock practice session in your course to confirm your webcam, microphone, and screen sharing all work correctly." }
      ]
    },
    {
      title: "Browser settings",
      items: [
        { label: "Pop-up blockers are disabled for my course site", note: "Some course tools and Honorlock require pop-ups to function. In Chrome: Settings \u2192 Privacy and security \u2192 Site settings \u2192 Pop-ups and redirects." },
        { label: "Camera and microphone access is enabled in Chrome", note: "Chrome: Settings \u2192 Privacy and security \u2192 Site settings \u2192 Camera / Microphone. Make sure your course site is not blocked." },
        { label: "Cookies are enabled for the course site", note: "Required for logging in and saving your progress. Chrome: Settings \u2192 Privacy and security \u2192 Cookies and other site data." }
      ]
    },
    {
      title: "Tech support",
      items: [
        { label: "I know how to contact San Jacinto College tech support", note: "Visit sanjac.edu or call the help desk. Save the number in your phone now so you are not searching during an emergency." },
        { label: "I have logged into my student portal and course site at least once", note: "Verify your username and password work before coursework begins. Reset your password now if needed \u2014 do not wait." },
        { label: "I know where to find IT help articles and tutorials", note: "San Jacinto\u2019s tech support site has step-by-step guides for common issues including browser settings and Honorlock troubleshooting." }
      ]
    }
  ];

  var dynamicItems = {
    16: [
      { label: "I have blocked 6\u20139 hours per week in my schedule for this course", note: "This works out to roughly one to one and a half hours per day. A regular routine reduces the risk of falling behind." },
      { label: "I have identified which specific days and times I will do coursework each week", note: "Write it down or add it to your calendar. Treat study time like a class you cannot skip." }
    ],
    12: [
      { label: "I have blocked 8\u201312 hours per week in my schedule for this course", note: "A 12-week course moves faster than a traditional semester. Missing even one week is difficult to recover from." },
      { label: "I have a plan for weeks that include holidays or unusually heavy obligations", note: "Identify potential conflicts now and plan to work ahead of those weeks." }
    ],
    10: [
      { label: "I have blocked 10\u201314 hours per week in my schedule for this course", note: "Expect roughly two hours of study on most days. Make this a non-negotiable part of your daily schedule." },
      { label: "I have spoken with family or employers about my schedule demands this term", note: "A 10-week course requires strong time protection. The people around you need to know what to expect." }
    ],
    5: [
      { label: "I have blocked 20\u201330 hours per week in my schedule for this course", note: "A 5-week course is the equivalent of a full-time job in terms of time. This is not an exaggeration \u2014 plan accordingly." },
      { label: "I have reduced other major commitments during this 5-week period where possible", note: "If you can reduce work hours, other courses, or major obligations during this term, it will make a significant difference." },
      { label: "I have a day-by-day study plan, not just a weekly one", note: "With this much material compressed into five weeks, planning each day in advance is essential to staying on track." }
    ]
  };

  var currentWeeks = 12;
  var checks = {};

  function buildChecklist(weeks) {
    checks = {};
    var container = document.getElementById("clSections");
    container.innerHTML = "";

    var allSections = staticSections.slice();
    allSections.push({ title: "Time & schedule planning", items: dynamicItems[weeks] });

    allSections.forEach(function (sec, si) {
      var secEl = document.createElement("div");
      secEl.className = "cl-section";

      var hdr = document.createElement("div");
      hdr.className = "cl-section-header";
      hdr.innerHTML = '<span class="cl-section-title">' + sec.title + '</span><span class="cl-section-count" id="clCount' + si + '">0 / ' + sec.items.length + '</span>';
      secEl.appendChild(hdr);

      sec.items.forEach(function (item, ii) {
        var key = si + "-" + ii;
        checks[key] = false;

        var row = document.createElement("div");
        row.className = "cl-item";
        row.setAttribute("role", "checkbox");
        row.setAttribute("aria-checked", "false");
        row.setAttribute("tabindex", "0");
        row.innerHTML =
          '<div class="cl-checkbox"><span class="cl-checkmark">&#10003;</span></div>' +
          '<div class="cl-item-body">' +
            '<div class="cl-item-label">' + item.label + '</div>' +
            (item.note ? '<div class="cl-item-note">' + item.note + '</div>' : '') +
          '</div>';

        row.addEventListener("click", function () { toggle(key, allSections); });
        row.addEventListener("keydown", function (e) {
          if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggle(key, allSections); }
        });
        secEl.appendChild(row);
      });

      container.appendChild(secEl);
    });

    updateProgress(allSections);
  }

  function toggle(key, allSections) {
    checks[key] = !checks[key];
    var rows = document.querySelectorAll("#clSections .cl-item");
    var idx = 0;
    allSections.forEach(function (sec, si) {
      sec.items.forEach(function (item, ii) {
        var k = si + "-" + ii;
        if (k === key) {
          rows[idx].classList.toggle("cl-checked", checks[key]);
          rows[idx].setAttribute("aria-checked", checks[key] ? "true" : "false");
        }
        idx++;
      });
    });
    updateProgress(allSections);
  }

  function updateProgress(allSections) {
    var keys = Object.keys(checks);
    var total = keys.length;
    var done = keys.filter(function (k) { return checks[k]; }).length;

    document.getElementById("clProgressText").textContent = done + " / " + total + " complete";
    document.getElementById("clProgressFill").style.width = total ? Math.round(done / total * 100) + "%" : "0%";

    allSections.forEach(function (sec, si) {
      var secDone = sec.items.filter(function (item, ii) { return checks[si + "-" + ii]; }).length;
      var el = document.getElementById("clCount" + si);
      if (el) el.textContent = secDone + " / " + sec.items.length;
    });

    document.getElementById("clAllDone").style.display = (done === total && total > 0) ? "block" : "none";
  }

  function setWeeks(weeks) {
    currentWeeks = weeks;
    document.querySelectorAll(".cl-sem-btn").forEach(function (btn) {
      btn.classList.toggle("cl-active", parseInt(btn.getAttribute("data-weeks")) === weeks);
    });
    var info = timeInfo[weeks];
    document.getElementById("clBannerHeading").textContent = info.heading;
    document.getElementById("clBannerBody").textContent = info.body;
    buildChecklist(weeks);
  }

  document.querySelectorAll(".cl-sem-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      setWeeks(parseInt(btn.getAttribute("data-weeks")));
    });
  });

  setWeeks(12);
})();
</script>

</body>
</html>
