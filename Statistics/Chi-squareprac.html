
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi-Square Practice Applet (Lesson 24)</title>
  <style>
    body { background: #f5f7fa; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
    .container { max-width: 980px; margin: 30px auto; background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); padding: 30px; }
    h1 { text-align: center; color: #4a4a8a; margin-bottom: 10px; }
    .sidebar { float: left; width: 200px; background: #f0f0ff; border-radius: 10px; margin-right: 24px; padding: 16px 0; min-height: 600px; }
    .sidebar button { display: block; width: 100%; background: none; border: none; padding: 14px 18px; text-align: left; font-size: 15px; color: #667eea; font-weight: 600; border-radius: 0 20px 20px 0; margin-bottom: 2px; cursor: pointer; transition: background 0.2s; }
    .sidebar button.active { background: #667eea; color: #fff; }
    .sidebar button:hover { background: #dde0ff; }
    .sidebar button.active:hover { background: #5a6fd6; }
    .main { margin-left: 230px; min-height: 600px; }
    .step { margin-bottom: 22px; padding: 15px; background: #fafbfc; border-radius: 8px; border-left: 4px solid #667eea; }
    .step label { font-weight: 600; display: block; margin-bottom: 8px; color: #333; }
    .step input[type=number], .step select { padding: 10px; border: 1.5px solid #bbb; border-radius: 6px; font-size: 15px; margin-right: 10px; }
    .step select { min-width: 280px; }
    .check-btn { background: #667eea; color: #fff; border: none; padding: 10px 28px; border-radius: 20px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .check-btn:hover { background: #4a4a8a; }
    .feedback { margin-top: 10px; font-weight: 600; padding: 8px 12px; border-radius: 6px; }
    .feedback.correct { color: #155724; background: #d4edda; }
    .feedback.incorrect { color: #721c24; background: #f8d7da; }
    .summary-section { margin-bottom: 22px; }
    .summary-section h3 { color: #4a4a8a; margin-bottom: 10px; border-bottom: 2px solid #667eea; padding-bottom: 6px; }
    .formula-box { background: #f0f0ff; border-left: 4px solid #667eea; padding: 20px; margin: 15px 0; text-align: center; border-radius: 0 8px 8px 0; }
    .formula-box .chi-formula { font-size: 28px; font-family: 'Times New Roman', serif; margin: 15px 0; }
    .formula-box .chi-formula .chi { font-style: italic; }
    .formula-box .fraction { display: inline-block; vertical-align: middle; text-align: center; }
    .formula-box .fraction .num { border-bottom: 2px solid #333; padding: 0 5px; display: block; }
    .formula-box .fraction .den { padding: 0 5px; display: block; }
    .df-formulas { margin: 15px 0; text-align: left; }
    .df-formulas div { margin: 8px 0; padding: 8px 15px; background: #fff; border-radius: 6px; }
    table.data-table { border-collapse: collapse; margin: 15px 0; width: 100%; }
    table.data-table th, table.data-table td { border: 1.5px solid #bbb; padding: 10px 14px; text-align: center; }
    table.data-table th { background: #667eea; color: #fff; font-weight: 600; }
    table.data-table td { background: #fafbfc; }
    .question-stem { background: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #17a2b8; }
    .question-stem b { color: #0c5460; }
    ul { margin: 10px 0; padding-left: 25px; }
    ul li { margin: 6px 0; }
    @media (max-width: 900px) { 
      .sidebar { float: none; width: 100%; margin: 0 0 20px 0; min-height: unset; display: flex; flex-wrap: wrap; } 
      .sidebar button { width: auto; flex: 1; min-width: 120px; border-radius: 8px; margin: 4px; }
      .main { margin-left: 0; } 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>&chi;<sup>2</sup> Practice Applet</h1>
    <p style="text-align:center; color:#666; margin-top:0;">Lesson 24 - Chi-Square Hypothesis Testing</p>
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
  <script>
    const defined = (x) => x !== undefined && x !== null;

    const problems = [
      {
        name: "Summary",
        content: `
          <div class="summary-section">
            <h3>Chi-Square Test Types</h3>
            <ul>
              <li><b>Goodness of Fit:</b> One categorical variable, compare observed to expected distribution.</li>
              <li><b>Test of Independence:</b> Two categorical variables, one sample, test for association.</li>
              <li><b>Test for Homogeneity:</b> One categorical variable, two or more independent samples, test if distributions are the same.</li>
            </ul>
          </div>
          <div class="summary-section">
            <h3>Quick Reference</h3>
            <div class="formula-box">
              <div style="font-weight:600; color:#4a4a8a; margin-bottom:10px;">Chi-Square Formula</div>
              <div class="chi-formula">
                <span class="chi">&chi;</span><sup>2</sup> = &Sigma;
                <span class="fraction">
                  <span class="num">(O &minus; E)<sup>2</sup></span>
                  <span class="den">E</span>
                </span>
              </div>
              <div style="color:#666; font-size:14px; margin-top:10px;">Sum of (Observed &minus; Expected)&sup2; divided by Expected for each cell</div>
              <div class="df-formulas">
                <div><b>Degrees of Freedom:</b></div>
                <div><b>Goodness of Fit:</b> df = k &minus; 1 &nbsp;&nbsp;(k = number of categories)</div>
                <div><b>Independence/Homogeneity:</b> df = (r &minus; 1)(c &minus; 1) &nbsp;&nbsp;(r = rows, c = columns)</div>
              </div>
            </div>
          </div>
          <div class="summary-section">
            <h3>Hypothesis Reminders</h3>
            <ul>
              <li><b>Goodness of Fit:</b> H<sub>0</sub>: Proportions are as expected. &nbsp; H<sub>a</sub>: At least one proportion is different.</li>
              <li><b>Independence:</b> H<sub>0</sub>: Variables are independent. &nbsp; H<sub>a</sub>: Variables are not independent.</li>
              <li><b>Homogeneity:</b> H<sub>0</sub>: Distributions are the same. &nbsp; H<sub>a</sub>: At least one distribution is different.</li>
            </ul>
          </div>
          <div class="summary-section">
            <h3>Decision Reminders</h3>
            <ul>
              <li>If p-value &lt; &alpha;, <b>reject H<sub>0</sub></b></li>
              <li>If p-value &ge; &alpha;, <b>fail to reject H<sub>0</sub></b></li>
              <li>Always write H<sub>a</sub> in context!</li>
            </ul>
          </div>
          <div class="summary-section">
            <h3>Assumptions</h3>
            <ul>
              <li>Data must be categorical (counts)</li>
              <li>Reasonably random sample</li>
              <li>All expected counts must be at least 5</li>
            </ul>
          </div>
        `
      },
      {
        name: "Candy Colors",
        stem: "A bag of colored candies is supposed to be equally distributed among 5 colors. Out of 100 candies, the counts are shown below. Is there evidence the distribution is not as expected?",
        table: [
          ["Color", "Observed"],
          ["Red", "18"],
          ["Blue", "22"],
          ["Green", "20"],
          ["Yellow", "19"],
          ["Orange", "21"]
        ],
        steps: [
          { label: "1. Calculate the expected count for each color (total ÷ number of colors):", type: "input", expected: 20, correct: "Correct! Each color is expected to have 20 candies (100 ÷ 5 = 20).", hint: "Divide the total (100) by the number of colors (5)." },
          { label: "2. What type of chi-square test should you use?", type: "select", options: ["Goodness of Fit", "Independence", "Homogeneity"], answer: "Goodness of Fit", correct: "Correct! This is a Goodness of Fit test.", hint: "This is one categorical variable compared to an expected distribution." },
          { label: "3. Select the null hypothesis (H₀):", type: "select", options: ["Proportions are as expected.", "Variables are independent.", "Distributions are the same."], answer: "Proportions are as expected.", correct: "Great! H₀: Proportions are as expected.", hint: "For GoF, H₀ is that the proportions are as expected." },
          { label: "4. Select the alternative hypothesis (Hₐ):", type: "select", options: ["At least one proportion is different.", "Variables are not independent.", "At least one distribution is different."], answer: "At least one proportion is different.", correct: "Great! Hₐ: At least one proportion is different.", hint: "For GoF, Hₐ is that at least one proportion is different." },
          { label: "5. Enter the chi-square statistic and p-value (rounded to 3 decimals):", type: "calc", chi: [0.5], p: [0.974], correct: "Correct! χ² = 0.5 and p-value = 0.974", hint: "Expected = 20 for each. χ² = (18-20)²/20 + (22-20)²/20 + (20-20)²/20 + (19-20)²/20 + (21-20)²/20 = 0.5" },
          { label: "6. Select the correct conclusion:", type: "select", options: ["Since the p-value > α, fail to reject H₀. There is not sufficient evidence to suggest the proportions are different.", "Since the p-value < α, reject H₀. There is sufficient evidence to suggest the proportions are different."], answer: "Since the p-value > α, fail to reject H₀. There is not sufficient evidence to suggest the proportions are different.", correct: "Good! Since p-value (0.974) > α, fail to reject H₀.", hint: "If p-value > α, fail to reject H₀." },
          { label: "7. Which color(s) had the highest chi-square contribution?", type: "select", options: ["Red", "Blue", "Green", "Yellow", "Orange", "Red and Blue"], answer: ["Red", "Blue", "Red and Blue"], correct: "Correct! Red and Blue both had the highest contribution of 0.2 each.", hint: "Calculate (O-E)²/E for each. Red: (18-20)²/20 = 0.2, Blue: (22-20)²/20 = 0.2" }
        ]
      },
      {
        name: "Spinner",
        stem: "A spinner is supposed to land on A 50%, B 30%, C 20%. Out of 200 spins, the results are: A = 110, B = 55, C = 35. Is the spinner fair?",
        table: [
          ["Outcome", "Observed", "Expected %"],
          ["A", "110", "50%"],
          ["B", "55", "30%"],
          ["C", "35", "20%"]
        ],
        steps: [
          { label: "1. Calculate the expected count for A (50% of 200):", type: "input", expected: 100, correct: "Correct! Expected for A is 100.", hint: "50% of 200 = 0.50 × 200 = 100" },
          { label: "2. Calculate the expected count for B (30% of 200):", type: "input", expected: 60, correct: "Correct! Expected for B is 60.", hint: "30% of 200 = 0.30 × 200 = 60" },
          { label: "3. Calculate the expected count for C (20% of 200):", type: "input", expected: 40, correct: "Correct! Expected for C is 40.", hint: "20% of 200 = 0.20 × 200 = 40" },
          { label: "4. What type of chi-square test should you use?", type: "select", options: ["Goodness of Fit", "Independence", "Homogeneity"], answer: "Goodness of Fit", correct: "Correct! This is a Goodness of Fit test.", hint: "One categorical variable compared to expected proportions." },
          { label: "5. Select the null hypothesis (H₀):", type: "select", options: ["Proportions are as expected.", "Variables are independent.", "Distributions are the same."], answer: "Proportions are as expected.", correct: "Great! H₀: Proportions are as expected.", hint: "For GoF, H₀ is that the proportions are as expected." },
          { label: "6. Select the alternative hypothesis (Hₐ):", type: "select", options: ["At least one proportion is different.", "Variables are not independent.", "At least one distribution is different."], answer: "At least one proportion is different.", correct: "Great! Hₐ: At least one proportion is different.", hint: "For GoF, Hₐ is that at least one proportion is different." },
          { label: "7. Enter the chi-square statistic and p-value (rounded to 3 decimals):", type: "calc", chi: [2.042, 2.04], p: [0.36, 0.360], correct: "Correct! χ² ≈ 2.042 and p-value ≈ 0.36", hint: "χ² = (110-100)²/100 + (55-60)²/60 + (35-40)²/40 = 1 + 0.417 + 0.625 = 2.042" },
          { label: "8. Select the correct conclusion:", type: "select", options: ["Since the p-value > α, fail to reject H₀. There is not sufficient evidence to suggest the spinner is unfair.", "Since the p-value < α, reject H₀. There is sufficient evidence to suggest the spinner is unfair."], answer: "Since the p-value > α, fail to reject H₀. There is not sufficient evidence to suggest the spinner is unfair.", correct: "Good! Since p-value > α, fail to reject H₀.", hint: "If p-value > α, fail to reject H₀." },
          { label: "9. Which outcome had the highest chi-square contribution?", type: "select", options: ["A", "B", "C"], answer: ["A"], correct: "Correct! A had the largest contribution of 1.0.", hint: "A: (110-100)²/100 = 1.0, B: 0.417, C: 0.625" }
        ]
      },
      {
        name: "Survey",
        stem: "A survey expects Yes 60%, No 25%, Maybe 15%. Out of 120 responses: Yes = 65, No = 30, Maybe = 25. Is the distribution as expected?",
        table: [
          ["Response", "Observed", "Expected %"],
          ["Yes", "65", "60%"],
          ["No", "30", "25%"],
          ["Maybe", "25", "15%"]
        ],
        steps: [
          { label: "1. Calculate the expected count for Yes (60% of 120):", type: "input", expected: 72, correct: "Correct! Expected for Yes is 72.", hint: "60% of 120 = 0.60 × 120 = 72" },
          { label: "2. Calculate the expected count for No (25% of 120):", type: "input", expected: 30, correct: "Correct! Expected for No is 30.", hint: "25% of 120 = 0.25 × 120 = 30" },
          { label: "3. Calculate the expected count for Maybe (15% of 120):", type: "input", expected: 18, correct: "Correct! Expected for Maybe is 18.", hint: "15% of 120 = 0.15 × 120 = 18" },
          { label: "4. What type of chi-square test should you use?", type: "select", options: ["Goodness of Fit", "Independence", "Homogeneity"], answer: "Goodness of Fit", correct: "Correct! This is a Goodness of Fit test.", hint: "Observed counts compared to expected percentages." },
          { label: "5. Select the null hypothesis (H₀):", type: "select", options: ["Proportions are as expected.", "Variables are independent.", "Distributions are the same."], answer: "Proportions are as expected.", correct: "Great! H₀: Proportions are as expected.", hint: "For GoF, H₀ is that the proportions are as expected." },
          { label: "6. Select the alternative hypothesis (Hₐ):", type: "select", options: ["At least one proportion is different.", "Variables are not independent.", "At least one distribution is different."], answer: "At least one proportion is different.", correct: "Great! Hₐ: At least one proportion is different.", hint: "For GoF, Hₐ is that at least one proportion is different." },
          { label: "7. Enter the chi-square statistic and p-value (rounded to 3 decimals):", type: "calc", chi: [3.403, 3.40], p: [0.182, 0.18], correct: "Correct! χ² ≈ 3.403 and p-value ≈ 0.182", hint: "χ² = (65-72)²/72 + (30-30)²/30 + (25-18)²/18 = 0.681 + 0 + 2.722 = 3.403" },
          { label: "8. Select the correct conclusion:", type: "select", options: ["Since the p-value > α, fail to reject H₀. There is not sufficient evidence to suggest the proportions are different.", "Since the p-value < α, reject H₀. There is sufficient evidence to suggest the proportions are different."], answer: "Since the p-value > α, fail to reject H₀. There is not sufficient evidence to suggest the proportions are different.", correct: "Good! Since p-value > α, fail to reject H₀.", hint: "If p-value > α, fail to reject H₀." },
          { label: "9. Which response had the highest chi-square contribution?", type: "select", options: ["Yes", "No", "Maybe"], answer: ["Maybe"], correct: "Correct! Maybe had the largest contribution of 2.722.", hint: "Yes: 0.681, No: 0, Maybe: (25-18)²/18 = 2.722" }
        ]
      },
      {
        name: "Drinks & Snacks",
        stem: "A survey of 120 students asked about their favorite drink (Tea, Coffee, Juice) and favorite snack (Chips, Fruit). Is there an association between drink and snack preference?",
        table: [
          ["", "Chips", "Fruit", "Total"],
          ["Tea", "15", "10", "25"],
          ["Coffee", "20", "35", "55"],
          ["Juice", "15", "25", "40"],
          ["Total", "50", "70", "120"]
        ],
        steps: [
          { label: "1. What type of chi-square test should you use?", type: "select", options: ["Goodness of Fit", "Independence", "Homogeneity"], answer: "Independence", correct: "Correct! This is a Test of Independence.", hint: "Two categorical variables from one sample." },
          { label: "2. Select the null hypothesis (H₀):", type: "select", options: ["Proportions are as expected.", "Variables are independent.", "Distributions are the same."], answer: "Variables are independent.", correct: "Great! H₀: The variables are independent.", hint: "For independence, H₀ is that the variables are independent." },
          { label: "3. Select the alternative hypothesis (Hₐ):", type: "select", options: ["At least one proportion is different.", "Variables are not independent.", "At least one distribution is different."], answer: "Variables are not independent.", correct: "Great! Hₐ: The variables are not independent.", hint: "For independence, Hₐ is that the variables are not independent." },
          { label: "4. Enter the chi-square statistic and p-value (rounded to 3 decimals):", type: "calc", chi: [4.379, 4.38], p: [0.112, 0.11], correct: "Correct! χ² ≈ 4.379 and p-value ≈ 0.112", hint: "Calculate expected for each cell using (row total × column total) / grand total, then sum (O-E)²/E." },
          { label: "5. Select the correct conclusion:", type: "select", options: ["Since the p-value > α, fail to reject H₀. There is not sufficient evidence to suggest an association.", "Since the p-value < α, reject H₀. There is sufficient evidence to suggest an association."], answer: "Since the p-value > α, fail to reject H₀. There is not sufficient evidence to suggest an association.", correct: "Good! Since p-value > α, fail to reject H₀.", hint: "If p-value > α, fail to reject H₀." },
          { label: "6. Which cell had the highest chi-square contribution?", type: "select", options: ["Tea/Chips", "Tea/Fruit", "Coffee/Chips", "Coffee/Fruit", "Juice/Chips", "Juice/Fruit"], answer: ["Tea/Chips"], correct: "Correct! Tea/Chips had the largest contribution.", hint: "Expected for Tea/Chips = (25×50)/120 = 10.42. Contribution = (15-10.42)²/10.42 = 2.02" }
        ]
      },
      {
        name: "Drinks by Gender",
        stem: "The following data is on drinking behavior for independently chosen random samples of male and female students. Does there appear to be a gender difference with respect to drinking behavior? (Note: low = 1-7 drinks/wk, moderate = 8-24 drinks/wk, high = 25+ drinks/wk)",
        table: [
          ["", "Men", "Women", "Total"],
          ["None", "140", "186", "326"],
          ["Low", "478", "661", "1139"],
          ["Moderate", "300", "173", "473"],
          ["High", "63", "16", "79"],
          ["Total", "981", "1036", "2017"]
        ],
        steps: [
          { label: "1. What type of chi-square test should you use?", type: "select", options: ["Goodness of Fit", "Independence", "Homogeneity"], answer: "Homogeneity", correct: "Correct! This is a Test for Homogeneity.", hint: "Two independent samples (men/women) comparing distributions." },
          { label: "2. Select the null hypothesis (H₀):", type: "select", options: ["Proportions are as expected.", "Variables are independent.", "Distributions are the same."], answer: "Distributions are the same.", correct: "Great! H₀: Distributions are the same.", hint: "For homogeneity, H₀ is that the distributions are the same." },
          { label: "3. Select the alternative hypothesis (Hₐ):", type: "select", options: ["At least one proportion is different.", "Variables are not independent.", "At least one distribution is different."], answer: "At least one distribution is different.", correct: "Great! Hₐ: At least one distribution is different.", hint: "For homogeneity, Hₐ is that at least one distribution is different." },
          { label: "4. Enter the chi-square statistic and p-value (rounded to 3 decimals):", type: "calc", chi: [96.526, 96.53], p: [0, 0.000, 0.001], correct: "Correct! χ² ≈ 96.526 and p-value ≈ 0 (very small)", hint: "Calculate expected for each cell, then sum (O-E)²/E for all 8 cells." },
          { label: "5. Select the correct conclusion:", type: "select", options: ["Since the p-value < α, reject H₀. There is sufficient evidence to suggest at least one distribution is different.", "Since the p-value > α, fail to reject H₀. There is not sufficient evidence to suggest a difference."], answer: "Since the p-value < α, reject H₀. There is sufficient evidence to suggest at least one distribution is different.", correct: "Good! Since p-value < α, reject H₀. There IS a gender difference in drinking behavior.", hint: "If p-value < α, reject H₀." },
          { label: "6. Which cell had the highest chi-square contribution?", type: "select", options: ["Men/None", "Women/None", "Men/Low", "Women/Low", "Men/Moderate", "Women/Moderate", "Men/High", "Women/High"], answer: ["Men/Moderate"], correct: "Correct! Men/Moderate had the largest contribution.", hint: "Expected for Men/Moderate = (981×473)/2017 = 230.1. Contribution = (300-230.1)²/230.1 = 21.2" }
        ]
      }
    ];

    const sidebarDiv = document.getElementById('sidebar');
    const mainDiv = document.getElementById('main');
    let activeTab = 0;

    function renderSidebar() {
      sidebarDiv.innerHTML = '';
      problems.forEach((p, i) => {
        const btn = document.createElement('button');
        btn.className = (i === activeTab ? 'active' : '');
        btn.textContent = p.name;
        btn.onclick = () => { activeTab = i; renderSidebar(); renderMain(); };
        sidebarDiv.appendChild(btn);
      });
    }

    function renderMain() {
      mainDiv.innerHTML = '';
      const p = problems[activeTab];
      
      if (activeTab === 0) {
        mainDiv.innerHTML = p.content;
        return;
      }
      
      // Question stem
      const stemDiv = document.createElement('div');
      stemDiv.className = 'question-stem';
      stemDiv.innerHTML = '<b>Question:</b> ' + p.stem;
      mainDiv.appendChild(stemDiv);
      
      // Data table
      if (p.table) {
        const table = document.createElement('table');
        table.className = 'data-table';
        p.table.forEach((row, i) => {
          const tr = document.createElement('tr');
          row.forEach((cell) => {
            const tag = i === 0 ? 'th' : 'td';
            const td = document.createElement(tag);
            td.textContent = cell;
            tr.appendChild(td);
          });
          table.appendChild(tr);
        });
        mainDiv.appendChild(table);
      }
      
      // Steps
      if (p.steps) {
        p.steps.forEach((step) => {
          const stepDiv = document.createElement('div');
          stepDiv.className = 'step';
          
          const labelEl = document.createElement('label');
          labelEl.innerHTML = step.label;
          stepDiv.appendChild(labelEl);
          
          let input;
          
          if (step.type === 'select') {
            input = document.createElement('select');
            const defaultOpt = document.createElement('option');
            defaultOpt.value = '';
            defaultOpt.textContent = '-- Select an answer --';
            input.appendChild(defaultOpt);
            step.options.forEach(opt => {
              const option = document.createElement('option');
              option.value = opt;
              option.textContent = opt;
              input.appendChild(option);
            });
            stepDiv.appendChild(input);
          } else if (step.type === 'input') {
            input = document.createElement('input');
            input.type = 'number';
            input.step = '0.01';
            input.placeholder = 'Enter expected count';
            input.style.width = '150px';
            stepDiv.appendChild(input);
          } else if (step.type === 'calc') {
            input = document.createElement('div');
            input.innerHTML = "<input type='number' step='0.001' placeholder='χ² value' style='width:120px;'> <input type='number' step='0.001' placeholder='p-value' style='width:120px;'>";
            stepDiv.appendChild(input);
          }
          
          const checkBtn = document.createElement('button');
          checkBtn.className = 'check-btn';
          checkBtn.textContent = 'Check';
          
          const feedback = document.createElement('div');
          feedback.className = 'feedback';
          feedback.style.display = 'none';
          
          checkBtn.onclick = () => {
            let correct = false;
            
            if (step.type === 'select') {
              if (Array.isArray(step.answer)) {
                correct = step.answer.includes(input.value);
              } else {
                correct = input.value === step.answer;
              }
            } else if (step.type === 'input') {
              const val = parseFloat(input.value);
              correct = !isNaN(val) && Math.abs(val - step.expected) < 0.5;
            } else if (step.type === 'calc') {
              const chiInput = input.children[0];
              const pInput = input.children[1];
              const chi = parseFloat(chiInput.value);
              const pval = parseFloat(pInput.value);
              
              let chiOk = false, pOk = false;
              
              if (!isNaN(chi)) {
                if (Array.isArray(step.chi)) {
                  chiOk = step.chi.some(val => Math.abs(chi - val) < 0.05);
                } else {
                  chiOk = Math.abs(chi - step.chi) < 0.05;
                }
              }
              
              if (!isNaN(pval)) {
                if (Array.isArray(step.p)) {
                  pOk = step.p.some(val => Math.abs(pval - val) < 0.02);
                } else {
                  pOk = Math.abs(pval - step.p) < 0.02;
                }
              }
              
              correct = chiOk && pOk;
            }
            
            feedback.style.display = 'block';
            if (correct) {
              feedback.textContent = '✓ ' + step.correct;
              feedback.className = 'feedback correct';
            } else {
              feedback.textContent = '✗ Hint: ' + step.hint;
              feedback.className = 'feedback incorrect';
            }
          };
          
          stepDiv.appendChild(document.createElement('br'));
          stepDiv.appendChild(checkBtn);
          stepDiv.appendChild(feedback);
          mainDiv.appendChild(stepDiv);
        });
      }
    }

    renderSidebar();
    renderMain();
  </script>
</body>
</html>
